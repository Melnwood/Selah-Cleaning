[build]
  publish = "public"
  functions = "netlify/functions"

# Daily at 07:10 UTC (~9am Prague) — sends 7-day and 2-day guest reminders.
[functions."selah-emails"]
  schedule = "10 7 * * *"

[[redirects]]
  from = "/cleaner"
  to = "/cleaner.html"
  status = 200

[[redirects]]
  from = "/payments"
  to = "/payments.html"
  status = 200

[[redirects]]
  from = "/maintenance"
  to = "/maintenance.html"
  status = 200

[[redirects]]
  from = "/dashboard"
  to = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/book"
  to = "/book.html"
  status = 200

[[redirects]]
  from = "/bookings"
  to = "/bookings.html"
  status = 200
