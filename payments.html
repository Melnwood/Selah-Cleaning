<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SELAH · Platby</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9ede6;--panel:#fff;--panel2:#f5f8f2;--ink:#1b2a22;--soft:#54655a;--line:#d6ddd2;
  --spruce:#1f3a2e;--pine:#2f5d4a;--pine2:#3c7359;--amber:#a56c15;--amberbg:#f5ead2;
  --barn:#a2372a;--barnbg:#f4ddd6;--done:#2f6b4c;--gold:#c6a24a;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.45}
.wrap{max-width:760px;margin:0 auto;padding:0 16px 80px}
.en-only{display:none}
body.lang-en .en-only{display:inline}
body.lang-en .cs-only{display:none}
.langtog{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;flex:none}
.langtog button{font:inherit;font-weight:700;font-size:12px;padding:6px 12px;border:0;background:transparent;color:var(--soft);cursor:pointer}
.langtog button.on{background:var(--spruce);color:#fff}
header{padding:18px 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px}
.brand{display:flex;align-items:center;gap:10px}
.roof{width:26px;height:26px;flex:none}
.roof path{fill:none;stroke:var(--spruce);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.brand h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;margin:0;line-height:1.1}
.brand .sub{font-size:12px;color:var(--soft);margin-top:3px}
.brand .txt{flex:1;min-width:0}
.mark{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11px;letter-spacing:.24em;color:var(--amber);line-height:1;margin-bottom:4px}
nav{font-size:13px;margin-top:8px}
nav a{color:var(--pine2);text-decoration:none;font-weight:600;margin-right:14px}

.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin:12px 0 4px}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 15px}
.kpi .num{font-family:'Space Mono',monospace;font-weight:700;font-size:23px;line-height:1}
.kpi .lbl{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin-top:5px}
.kpi.owed .num{color:var(--barn)} .kpi.paid .num{color:var(--done)}
.filters{display:flex;gap:6px;margin:12px 0 2px}
.filt{font:inherit;font-weight:600;font-size:13px;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--soft);cursor:pointer}
.filt.sel{background:var(--spruce);border-color:var(--spruce);color:#fff}

.month{margin-top:18px}
.mhead{display:flex;justify-content:space-between;align-items:baseline;padding:0 4px 6px;border-bottom:2px solid var(--ink)}
.mhead .mo{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:16px;text-transform:capitalize}
.mhead .mc{font-size:12px;color:var(--soft)}

.pay-row{background:var(--panel);border:1px solid var(--line);border-radius:13px;margin:9px 0;overflow:hidden}
.pay-row.paid{background:#f4f8f4;border-color:#cfe3d3}
.pay-row.open{border-color:var(--pine2)}
.prhead{display:flex;align-items:center;gap:11px;padding:12px 14px}
.prhead .exp{display:flex;align-items:center;gap:11px;flex:1;min-width:0;background:none;border:0;font:inherit;color:var(--ink);cursor:pointer;text-align:left;padding:0}
.chev{width:14px;height:14px;flex:none;transition:transform .18s}
.pay-row.open .chev{transform:rotate(90deg)}
.chev path{stroke:var(--pine);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.prhead .date{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14.5px;white-space:nowrap}
.prhead .who{font-size:12.5px;color:var(--soft);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.prhead .amt{font-family:'Space Mono',monospace;font-weight:700;font-size:15px;color:var(--amber);white-space:nowrap}
.paidbtn{font:inherit;font-weight:700;font-size:12.5px;white-space:nowrap;padding:8px 12px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--soft);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.paidbtn.is-paid{background:var(--done);border-color:var(--done);color:#fff}
.paidbtn .mk{width:13px;height:13px}
.paidbtn .mk path{stroke:currentColor;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
.paidmeta{font-size:11px;color:var(--done);padding:0 14px 10px;margin-top:-4px}

.cbody{padding:2px 14px 14px}
.cbody[hidden]{display:none}
.grp{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px}
.grp:first-child{margin-top:4px}
.line{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.line:last-child{border-bottom:0}
.line .v{font-family:'Space Mono',monospace;white-space:nowrap}
.line.tot{border-top:1px solid var(--ink);border-bottom:0;margin-top:4px;padding-top:9px;font-weight:700}
.line.tot .v{color:var(--amber)}
.finebox{background:var(--barnbg);border-radius:10px;padding:9px 12px;margin-top:10px;font-size:12.5px;color:var(--barn)}
.notebox{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px;font-size:13px;white-space:pre-wrap;margin-top:8px}
.replink{display:inline-block;margin-top:8px;font-size:12.5px;color:var(--pine2);text-decoration:none;font-weight:600}

.mtot{display:flex;justify-content:space-between;align-items:center;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 15px;margin-top:6px}
.mtot .l{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px}
.mtot .r{text-align:right}
.mtot .big{font-family:'Space Mono',monospace;font-weight:700;font-size:17px;color:var(--amber)}
.mtot .split{font-size:11px;color:var(--soft);margin-top:2px}

.muted{color:var(--soft);font-size:13px}
.loading{text-align:center;color:var(--soft);padding:48px}
.err{background:var(--barnbg);border:1px solid var(--barn);color:#7a281d;border-radius:12px;padding:14px;margin:14px 0}
.foot{font-size:11.5px;color:var(--soft);margin-top:18px;text-align:center}
button:focus-visible{outline:2px solid var(--pine2);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand">
      <svg class="roof" viewBox="0 0 28 28" aria-hidden="true"><path d="M3 15 L14 5 L25 15 M6 13 V24 H22 V13"/></svg>
      <div class="txt">
        <div class="mark">SELAH</div>
        <h1><span class="cs-only">Platby uklízeči</span><span class="en-only">Cleaner payments</span></h1>
        <div class="sub"><span class="cs-only">Odměny podle měsíce · označte, co je zaplaceno</span><span class="en-only">Pay by month · mark what’s been paid</span></div>
      </div>
      <div class="langtog" role="group" aria-label="Jazyk / Language">
        <button type="button" id="btnCs">CZ</button><button type="button" id="btnEn">EN</button>
      </div>
    </div>
    <nav>
      <a href="/cleaner.html"><span class="cs-only">Formulář ↗</span><span class="en-only">Form ↗</span></a>
      <a href="/maintenance.html"><span class="cs-only">Údržba ↗</span><span class="en-only">Maintenance ↗</span></a>
    </nav>
    <div class="kpis" id="kpis"></div>
    <div class="filters" id="filters"></div>
  </header>
  <div id="app"><div class="loading">…</div></div>
  <div class="foot" id="foot"></div>
</div>

<script>
const API='/.netlify/functions/airtable';
const F={totalOwed:'fldGgWLyyZlV3jlyd',fines:'fldmHlIAzb6WgVnMV',cleaner:'fldlPGZHTcOIL4DvO',
  notes:'flddOS4VpM1ZNFkdx',needsFixing:'fld1tdDipneoCHk5Z',startAt:'fldy5fzkRiO3WQgd9',
  paid:'fld538RLNod1CACIs',paidDate:'fldPdR5KbBlFkpsTS'};
const BASE_FEE=200;
const ROOMS=[
 {cs:'Hlavní dům',en:'Main house',items:[
  ['fldMfuX5Tv1rnqTsC','Kuchyň (přízemí)','Kitchen (ground)',200],
  ['fldetbVLqJiR7BUxz','Obývací pokoj (přízemí)','Living room (ground)',150],
  ['fldrhmNigOJzOTvfz','Zadní místnost a vstup','Back room & entry',130],
  ['fldKilqRocintHJMd','Koupelna (přízemí)','Bathroom (ground)',75],
  ['fldg4cahU5x8uQ3In','Hlavní ložnice','Master bedroom',100],
  ['fldwlRDk85Q3vRz7J','Hlavní koupelna','Master bathroom',70],
  ['fldbhVlH80EYpZiUr','Pokoj s manželskou postelí','Queen bedroom',100],
  ['fldi3syW5r77F3BXm','Pokoj s palandami','Bunk-beds bedroom',100],
  ['fldCSRxxXFceyGNwb','Koupelna na chodbě (horní patro)','Hallway bathroom (upstairs)',70]]},
 {cs:'Okna hlavního domu',en:'Main-house windows',items:[
  ['fldg3eVFJ59uh3PV1','Okna kuchyň & obývací pokoj (3)','Kitchen & living windows (3)',225],
  ['fldGqog2FArKZ1f7o','Francouzské dveře (2)','French doors (2)',8],
  ['fldv2dmuYke76vRyW','Okna zadní místnost a vstup (2)','Back room & entry windows (2)',135],
  ['fld3fvt0E46yaizGq','Okno koupelna (1)','Bathroom window (1)',45],
  ['fldqJGrNKqqD8UQ8B','Okna hlavní ložnice (3 + dveře)','Master windows (3 + door)',180],
  ['fldHRPb6ud46U8TgR','Okno hlavní koupelny (2)','Master bath window (2)',90],
  ['fldn2VzncODj06Rz1','Okno pokoje s manželskou postelí (1)','Queen window (1)',45],
  ['fldHs9u66iXfSzH8u','Okna pokoje s palandami (2)','Bunk-beds windows (2)',90],
  ['fldSMaF1nCqZNkWh9','Okno koupelny na chodbě (1)','Hallway bath window (1)',45],
  ['fldNmQWL9OSd3ZZwE','Okno na schodišti (1)','Stair window (1)',45]]},
 {cs:'Apartmán',en:'Apartment',items:[
  ['fld0GbY18NMS2iZBD','Apartmán','Apartment',140],
  ['fldRYJ8tJASnKp64G','Koupelna v apartmánu','Apartment bathroom',70],
  ['fld4mIbs62ksmPoVr','Okna apartmánu (4)','Apartment windows (4)',225]]}
];
let RAW=[],FILTER='all';
let LANG=localStorage.getItem('cabin_lang')||'cs';
function T(cs,en){return LANG==='en'?en:cs;}
function locale(){return LANG==='en'?'en-GB':'cs-CZ';}
function hdr(){const c=localStorage.getItem('cabin_code')||'';return c?{'Content-Type':'application/json','x-access-code':c}:{'Content-Type':'application/json'};}
function promptCode(){const c=prompt(T('Zadejte přístupový kód','Enter access code'));if(c){localStorage.setItem('cabin_code',c);location.reload();}}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function selName(v){return v&&typeof v==='object'?v.name:v;}
function money(v){const n=parseInt(String(v||'').replace(/[^\d-]/g,''),10);return isNaN(n)?0:n;}
function kc(n){return n.toLocaleString(locale())+' Kč';}

function applyLang(){
  document.body.classList.toggle('lang-en',LANG==='en');document.documentElement.lang=LANG;
  document.getElementById('btnCs').classList.toggle('on',LANG==='cs');
  document.getElementById('btnEn').classList.toggle('on',LANG==='en');
  if(RAW.length||document.getElementById('kpis').children.length)render();
}
document.getElementById('btnCs').onclick=()=>{LANG='cs';localStorage.setItem('cabin_lang','cs');applyLang();};
document.getElementById('btnEn').onclick=()=>{LANG='en';localStorage.setItem('cabin_lang','en');applyLang();};

async function load(){
  document.getElementById('app').innerHTML='<div class="loading">'+T('Načítám…','Loading…')+'</div>';
  try{
    const r=await fetch(API,{headers:hdr()});
    if(r.status===401){promptCode();return;}
    const {records=[]}=await r.json();
    RAW=records.sort((a,b)=>new Date(b.fields[F.startAt]||b.createdTime)-new Date(a.fields[F.startAt]||a.createdTime));
    render();
  }catch(e){document.getElementById('app').innerHTML='<div class="err">'+T('Nepodařilo se načíst data: ','Could not load data: ')+esc(e.message||e)+'</div>';}
}

function monthKey(x){const d=new Date(x.fields[F.startAt]||x.createdTime);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(k){const [y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleDateString(locale(),{month:'long',year:'numeric'});}

function render(){
  // KPI summary — across ALL records
  let owed=0,paidTotal=0;
  RAW.forEach(x=>{const p=money(x.fields[F.totalOwed]);if(x.fields[F.paid])paidTotal+=p;else owed+=p;});
  document.getElementById('kpis').innerHTML=`
    <div class="kpi owed"><div class="num">${kc(owed)}</div><div class="lbl">${T('Zbývá zaplatit','To pay')}</div></div>
    <div class="kpi paid"><div class="num">${kc(paidTotal)}</div><div class="lbl">${T('Zaplaceno celkem','Paid total')}</div></div>
    <div class="kpi"><div class="num">${RAW.length}</div><div class="lbl">${T('Úklidy','Cleanings')}</div></div>`;

  const filters=[['all',T('Vše','All')],['unpaid',T('Nezaplacené','Unpaid')]];
  document.getElementById('filters').innerHTML=filters.map(([k,l])=>`<button class="filt ${FILTER===k?'sel':''}" data-f="${k}">${l}</button>`).join('');
  document.querySelectorAll('.filt').forEach(b=>b.onclick=()=>{FILTER=b.dataset.f;render();});

  const recs=RAW.filter(x=>FILTER==='unpaid'?!x.fields[F.paid]:true);
  const app=document.getElementById('app');
  if(!recs.length){app.innerHTML=`<div class="muted" style="text-align:center;padding:40px">${FILTER==='unpaid'?T('Vše zaplaceno. 🎉','All paid. 🎉'):T('Žádné úklidy.','No cleanings.')}</div>`;}
  else{
    // group by month
    const groups={};recs.forEach(x=>{const k=monthKey(x);(groups[k]=groups[k]||[]).push(x);});
    const keys=Object.keys(groups).sort().reverse();
    app.innerHTML=keys.map(k=>{
      const items=groups[k];
      let mTotal=0,mPaid=0;
      items.forEach(x=>{const p=money(x.fields[F.totalOwed]);mTotal+=p;if(x.fields[F.paid])mPaid+=p;});
      const mOwed=mTotal-mPaid;
      return `<div class="month">
        <div class="mhead"><span class="mo">${monthLabel(k)}</span><span class="mc">${items.length} ${T('úklidů','cleanings')}</span></div>
        ${items.map(payRow).join('')}
        <div class="mtot"><span class="l">${T('Celkem za měsíc','Month total')}</span>
          <span class="r"><span class="big">${kc(mTotal)}</span><span class="split">${mOwed?T('zbývá','due')+' '+kc(mOwed)+' · ':''}${T('zaplaceno','paid')} ${kc(mPaid)}</span></span></div>
      </div>`;
    }).join('');
    recs.forEach(wire);
  }
  document.getElementById('foot').textContent=T('Pokuty se účtují hostům a nejsou součástí platby uklízeči.','Fines are charged to guests and are not part of the cleaner’s pay.');
}

function payRow(x){
  const f=x.fields;
  const d=new Date(f[F.startAt]||x.createdTime);
  const date=d.toLocaleDateString(locale(),{weekday:'short',day:'numeric',month:'short'});
  const pay=money(f[F.totalOwed]);
  const who=f[F.cleaner]||'—';
  const paid=!!f[F.paid];
  const pd=f[F.paidDate]?new Date(f[F.paidDate]).toLocaleDateString(locale()):'';
  const fix=selName(f[F.needsFixing])==='Yes';
  return `<div class="pay-row ${paid?'paid':''}" data-id="${x.id}">
    <div class="prhead">
      <button class="exp" type="button" aria-expanded="false">
        <svg class="chev" viewBox="0 0 16 16"><path d="M6 3 L11 8 L6 13"/></svg>
        <span class="date">${date}</span>
        <span class="who">${esc(who)}${fix?' · 🔧':''}</span>
        <span class="amt">${kc(pay)}</span>
      </button>
      <button class="paidbtn ${paid?'is-paid':''}" data-paid type="button">${paid?'<svg class="mk" viewBox="0 0 16 16"><path d="M3 8.5 L6.5 12 L13 4"/></svg>'+T('Zaplaceno','Paid'):T('Zaplatit','Mark paid')}</button>
    </div>
    ${paid&&pd?`<div class="paidmeta">✓ ${T('zaplaceno','paid')} ${pd}</div>`:''}
    <div class="cbody" hidden>${detail(f)}</div>
  </div>`;
}

function detail(f){
  let html='',any=false;
  ROOMS.forEach(grp=>{
    const done=grp.items.filter(([id])=>f[id]===true);
    if(!done.length)return;any=true;
    html+=`<div class="grp">${T(grp.cs,grp.en)}</div>`;
    done.forEach(([id,cs,en,price])=>{html+=`<div class="line"><span>${esc(T(cs,en))}</span><span class="v">${price} Kč</span></div>`;});
  });
  html+=`<div class="line"><span>${T('Základní poplatek','Base fee')}</span><span class="v">${BASE_FEE} Kč</span></div>`;
  html+=`<div class="line tot"><span>${T('Odměna celkem','Pay total')}</span><span class="v">${kc(money(f[F.totalOwed]))}</span></div>`;
  const fine=f[F.fines]||0;
  const notes=f[F.notes]||'';
  const fix=selName(f[F.needsFixing])==='Yes';
  return `<div>${html}</div>
    ${fine?`<div class="finebox">${T('Pokuty hostům za tento pobyt','Guest fines for this stay')}: <b>${kc(fine)}</b> — ${T('účtováno hostům, netýká se platby uklízeči.','charged to guests, not the cleaner.')}</div>`:''}
    ${notes?`<div class="notebox">${esc(notes)}</div>`:''}
    ${fix?`<a class="replink" href="/maintenance.html">🔧 ${T('Nahlášena oprava — otevřít Údržbu','Repair flagged — open Maintenance')} ↗</a>`:''}`;
}

function wire(x){
  const root=document.querySelector(`.pay-row[data-id="${x.id}"]`);
  const exp=root.querySelector('.exp'),body=root.querySelector('.cbody');
  exp.onclick=()=>{const open=root.classList.toggle('open');exp.setAttribute('aria-expanded',open);body.hidden=!open;};
  const pb=root.querySelector('[data-paid]');
  pb.onclick=async(e)=>{
    e.stopPropagation();
    const nowPaid=!x.fields[F.paid];
    pb.disabled=true;pb.textContent='…';
    const fields={};fields[F.paid]=nowPaid;fields[F.paidDate]=nowPaid?new Date().toISOString().slice(0,10):null;
    try{
      const r=await fetch(API,{method:'PATCH',headers:hdr(),body:JSON.stringify({id:x.id,fields})});
      if(r.status===401){promptCode();return;}
      const data=await r.json();
      if(!r.ok)throw new Error((data.error&&data.error.message)||data.error||'Error');
      x.fields=Object.assign({},x.fields,data.fields,fields);
      render();
    }catch(err){pb.disabled=false;alert(T('Uložení selhalo: ','Save failed: ')+(err.message||err));}
  };
}
applyLang();
load();
</script>
</body>
</html>
