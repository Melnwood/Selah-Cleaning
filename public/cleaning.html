<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SELAH · Úklid</title>
<link rel="icon" href="/favicon.ico" sizes="any">
<link rel="icon" href="/icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#1f3a2e">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Inter:wght@400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root{--bg:#e9ede6;--panel:#fff;--panel2:#f5f8f2;--ink:#1b2a22;--soft:#54655a;--line:#d6ddd2;--spruce:#1f3a2e;--pine:#2f5d4a;--pine2:#3c7359;--amber:#a56c15;--done:#2f6b4c;--donebg:#dbeee0;--pend:#8a6d1e;--pendbg:#faf1d8;--barn:#a2372a;--barnbg:#f4ddd6}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;padding:20px 16px 60px}
.en-only{display:none}body.lang-en .en-only{display:inline}body.lang-en .cs-only{display:none}
.wrap{max-width:640px;margin:0 auto}
.backlink{display:inline-block;color:var(--pine2);text-decoration:none;font-size:13px;font-weight:600;margin-bottom:10px}
.brand{display:flex;align-items:center;gap:12px}
.roof{width:32px;height:32px;flex:none}.roof path{fill:none;stroke:var(--spruce);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.mark{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:12px;letter-spacing:.26em;color:var(--amber)}
h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:23px;margin:0}
.txt{flex:1;min-width:0}.sub{color:var(--soft);font-size:13px;margin-top:2px}
.langtog{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff}
.langtog button{font:inherit;font-weight:700;font-size:12px;padding:6px 12px;border:0;background:transparent;color:var(--soft);cursor:pointer}
.langtog button.on{background:var(--spruce);color:#fff}

.cta{display:flex;align-items:center;gap:14px;background:var(--spruce);color:#fff;border-radius:16px;padding:18px;margin:18px 0 6px;text-decoration:none;box-shadow:0 4px 14px rgba(31,58,46,.22)}
.cta .ic{width:46px;height:46px;border-radius:13px;background:rgba(255,255,255,.14);display:grid;place-items:center;font-size:23px;flex:none}
.cta .t{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:17px}
.cta .d{font-size:12.5px;opacity:.85;margin-top:2px}
.cta .arr{margin-left:auto;font-size:22px}

.tabs{display:flex;gap:6px;margin:18px 0 12px;background:#dfe5da;padding:4px;border-radius:12px}
.tab{flex:1;font:inherit;font-weight:700;font-size:13.5px;padding:9px 8px;border:0;border-radius:9px;background:transparent;color:var(--soft);cursor:pointer}
.tab.sel{background:#fff;color:var(--spruce);box-shadow:0 1px 3px rgba(0,0,0,.08)}

.card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:13px 14px;margin:10px 0;box-shadow:0 2px 6px rgba(20,30,24,.05)}
.card .r1{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.card .nm{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15.5px}
.card .dt{font-family:'Space Mono',monospace;font-size:12px;color:var(--soft);white-space:nowrap}
.card .meta{font-size:12.5px;color:var(--soft);margin-top:4px}
.tagrow{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.tag{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px}
.tag.now{background:var(--donebg);color:var(--done)}
.tag.next{background:var(--pendbg);color:var(--pend)}
.tag.past{background:#e7ebe4;color:var(--soft)}
.tag.open{background:var(--barnbg);color:var(--barn)}
.tag.prog{background:var(--pendbg);color:var(--pend)}
.tag.hi{background:var(--barnbg);color:var(--barn)}
.seclbl{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 6px;display:flex;align-items:center;gap:8px}
.seclbl::after{content:"";flex:1;height:1px;background:var(--line)}
.fixbox{background:var(--panel2);border-left:3px solid var(--barn);border-radius:8px;padding:9px 11px;margin-top:9px;font-size:13.5px;white-space:pre-wrap}
.loading,.empty{text-align:center;color:var(--soft);padding:26px 0;font-size:13.5px}
.err{background:var(--barnbg);color:var(--barn);border-radius:11px;padding:11px 12px;font-size:13px;margin:10px 0}
.hint{background:var(--panel2);border:1px dashed var(--line);border-radius:11px;padding:10px 12px;font-size:12.5px;color:var(--soft);margin-bottom:4px}
</style>
</head>
<body>
<div class="wrap">
  <a href="/" class="backlink">← <span class="cs-only">Nabídka</span><span class="en-only">Menu</span></a>
  <div class="brand">
    <svg class="roof" viewBox="0 0 28 28" aria-hidden="true"><path d="M3 15 L14 5 L25 15 M6 13 V24 H22 V13"/></svg>
    <div class="txt">
      <div class="mark">SELAH</div>
      <h1><span class="cs-only">Úklid</span><span class="en-only">Cleaning</span></h1>
      <div class="sub"><span class="cs-only">Kdo tu byl · nahlásit úklid · co se opravuje</span><span class="en-only">Who was here · log a cleaning · what's being fixed</span></div>
    </div>
    <div class="langtog" role="group" aria-label="Jazyk / Language"><button type="button" id="btnCs">CZ</button><button type="button" id="btnEn">EN</button></div>
  </div>

  <a class="cta" href="/cleaner.html">
    <div class="ic">🧹</div>
    <div>
      <div class="t"><span class="cs-only">Nahlásit úklid</span><span class="en-only">Log a cleaning</span></div>
      <div class="d"><span class="cs-only">Co bylo uklizeno + co je třeba opravit</span><span class="en-only">What you cleaned + anything to fix</span></div>
    </div>
    <div class="arr">→</div>
  </a>

  <div class="tabs">
    <button class="tab sel" data-t="stays"><span class="cs-only">Pobyty</span><span class="en-only">Stays</span></button>
    <button class="tab" data-t="repairs"><span class="cs-only">Opravy</span><span class="en-only">Repairs</span></button>
  </div>
  <div id="app"><div class="loading">…</div></div>
</div>

<script>
const API='/.netlify/functions/airtable';
// Bookings
const B={bookedBy:'fldkrWGTZO9xH3tUg',checkin:'fldpmuL8HMEl49AaY',checkout:'fld6qnW9lBTsRze3u',party:'fldRuksM0SOYRaJOS',space:'fldUYaGvdvcV3EZOM',status:'fldpaz8B5NbPQ46pR'};
// Cleanings / maintenance
const M={fixNotes:'fld0ySTAz7IwQ6gys',needsFixing:'fld1tdDipneoCHk5Z',mStatus:'fld1XHyJRgSstFmxO',priority:'fldoCrKTXVRW1UX5J',assigned:'fldeaalnwAPlZZ5XP',startAt:'fldy5fzkRiO3WQgd9',renter:'fldesBx0AyJOhxrns',resolutionNotes:'fld6ypazIXO4JuPc0'};
let LANG=localStorage.getItem('cabin_lang')||'cs';
const TCACHE=(()=>{try{return JSON.parse(localStorage.getItem('cabin_tcache')||'{}');}catch(e){return {};}})();
const TRIED=new Set();
function userText(t){if(!t)return '';if(LANG!=='en')return t;return TCACHE[t]||t;}
async function ensureTranslations(texts){
  if(LANG!=='en')return false;
  const todo=[...new Set(texts.filter(t=>t&&!(t in TCACHE)&&!TRIED.has(t)))];
  if(!todo.length)return false;
  todo.forEach(t=>TRIED.add(t));
  try{
    const r=await fetch(API,{method:'POST',headers:hdr(),body:JSON.stringify({action:'translate',target:'en',texts:todo})});
    const data=await r.json();
    if(data.error)return false;
    const tr=data.translations||[];let added=false;
    todo.forEach((t,i)=>{const v=tr[i];if(typeof v==='string'&&v.trim()){TCACHE[t]=v;if(v!==t)added=true;}});
    try{localStorage.setItem('cabin_tcache',JSON.stringify(TCACHE));}catch(e){}
    return added;
  }catch(e){return false;}
}
function fixTexts(){return (CLEANINGS||[]).map(x=>(x.fields||{})[M.fixNotes]).filter(Boolean);}
let TAB='stays', BOOKINGS=[], CLEANINGS=[], ERR=null;
function T(cs,en){return LANG==='en'?en:cs;}
function locale(){return LANG==='en'?'en-GB':'cs-CZ';}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function sel(v){return v&&typeof v==='object'?v.name:v;}
function optLabel(s){const m=String(s||'').match(/^(.*?)\s*\((.*)\)\s*$/);return m?(LANG==='en'?m[2]:m[1]):s;}
function hdr(){const c=localStorage.getItem('cabin_code')||'';return c?{'Content-Type':'application/json','x-access-code':c}:{'Content-Type':'application/json'};}
function dstr(d){return d?new Date(String(d).slice(0,10)+'T00:00:00').toLocaleDateString(locale(),{day:'numeric',month:'short',year:'numeric'}):'—';}
function today0(){const t=new Date();t.setHours(0,0,0,0);return t;}
function dd(s){return s?new Date(String(s).slice(0,10)+'T00:00:00'):null;}
function approved(f){return /Schvál|Approved/i.test(sel(f[B.status])||'');}
function nights(f){const a=dd(f[B.checkin]),b=dd(f[B.checkout]);return (a&&b)?Math.max(0,Math.round((b-a)/86400000)):0;}

function applyLang(){document.body.classList.toggle('lang-en',LANG==='en');document.documentElement.lang=LANG;document.getElementById('btnCs').classList.toggle('on',LANG==='cs');document.getElementById('btnEn').classList.toggle('on',LANG==='en');render();}
document.getElementById('btnCs').onclick=()=>{LANG='cs';localStorage.setItem('cabin_lang','cs');applyLang();};
document.getElementById('btnEn').onclick=()=>{LANG='en';localStorage.setItem('cabin_lang','en');applyLang();ensureTranslations(fixTexts()).then(a=>{if(a)render();});};
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{TAB=b.dataset.t;document.querySelectorAll('.tab').forEach(x=>x.classList.toggle('sel',x===b));render();});

async function load(){
  try{
    const [rb,rc]=await Promise.all([
      fetch(API+'?t=bookings',{headers:hdr()}),
      fetch(API,{headers:hdr()})
    ]);
    const jb=await rb.json(), jc=await rc.json();
    BOOKINGS=jb.records||[]; CLEANINGS=jc.records||[];
  }catch(e){ERR=e.message||String(e);}
  render();
  ensureTranslations(fixTexts()).then(a=>{if(a)render();});
}

function staysBody(){
  const t=today0();
  const app=BOOKINGS.filter(x=>approved(x.fields)&&x.fields[B.checkin]);
  const past=app.filter(x=>{const co=dd(x.fields[B.checkout]);return co&&co<t;}).sort((a,b)=>a.fields[B.checkout]<b.fields[B.checkout]?1:-1).slice(0,5);
  const now=app.filter(x=>{const ci=dd(x.fields[B.checkin]),co=dd(x.fields[B.checkout]);return ci&&co&&ci<=t&&co>=t;});
  const next=app.filter(x=>{const ci=dd(x.fields[B.checkin]);return ci&&ci>t;}).sort((a,b)=>a.fields[B.checkin]<b.fields[B.checkin]?-1:1).slice(0,5);
  const card=(x,tag)=>{const f=x.fields;const both=/apartm|Apartment/i.test(sel(f[B.space])||'');
    return `<div class="card"><div class="r1"><span class="nm">${esc(f[B.bookedBy]||'—')}</span><span class="dt">${dstr(f[B.checkin])} – ${dstr(f[B.checkout])}</span></div>
      <div class="meta">👥 ${esc(f[B.party]||'?')} · ${nights(f)} ${T('nocí','nights')} · ${both?T('dům + apartmán','house + apt'):T('hlavní dům','main house')}</div>
      <div class="tagrow">${tag}</div></div>`;};
  let h='';
  if(now.length){h+=`<div class="seclbl">${T('Právě teď v domě','In the house now')}</div>`+now.map(x=>card(x,`<span class="tag now">${T('TEĎ TADY','HERE NOW')}</span>`)).join('');}
  h+=`<div class="seclbl">${T('Naposledy tu byli','Last people here')}</div>`;
  h+=past.length?past.map(x=>card(x,`<span class="tag past">${T('ODJELI','CHECKED OUT')} ${dstr(x.fields[B.checkout])}</span>`)).join(''):`<div class="empty">${T('Žádné minulé pobyty.','No past stays.')}</div>`;
  h+=`<div class="seclbl">${T('Kdo přijede','Coming next')}</div>`;
  h+=next.length?next.map(x=>card(x,`<span class="tag next">${T('PŘÍJEZD','ARRIVES')} ${dstr(x.fields[B.checkin])}</span>`)).join(''):`<div class="empty">${T('Žádné nadcházející pobyty.','No upcoming stays.')}</div>`;
  return h;
}

function repairsBody(){
  const open=CLEANINGS.filter(x=>{const f=x.fields;if(!f[M.needsFixing]&&!f[M.fixNotes])return false;const s=sel(f[M.mStatus])||'';return !/Vyřešeno|Resolved|Neopravovat|Won/i.test(s);})
    .sort((a,b)=>(a.fields[M.startAt]||'')<(b.fields[M.startAt]||'')?1:-1);
  if(!open.length)return `<div class="hint">${T('Vše je opraveno — žádné otevřené závady. Když něco najdete, nahlaste to ve formuláři úklidu.','Everything is fixed — nothing outstanding. If you find something, report it in the cleaning form.')}</div><div class="empty">✓ ${T('Žádné otevřené opravy','No open repairs')}</div>`;
  const h=`<div class="hint">${T('Toto se ještě opravuje. Nové závady nahlaste ve formuláři úklidu.','These are still being worked on. Report anything new in the cleaning form.')}</div>`;
  return h+open.map(x=>{const f=x.fields;const s=sel(f[M.mStatus])||'';
    const prog=/Probíhá|Progress/i.test(s);
    const pr=sel(f[M.priority])||'';
    const hi=/Vysok|High|Urgent|Naléh/i.test(pr);
    return `<div class="card">
      <div class="r1"><span class="nm">${esc(f[M.renter]||T('Závada','Issue'))}</span><span class="dt">${dstr(f[M.startAt])}</span></div>
      ${f[M.fixNotes]?`<div class="fixbox">${esc(userText(f[M.fixNotes]))}</div>`:''}
      <div class="tagrow">
        <span class="tag ${prog?'prog':'open'}">${esc((optLabel(s)||T('Nové','Open')).toUpperCase())}</span>
        ${hi?`<span class="tag hi">${esc(optLabel(pr).toUpperCase())}</span>`:''}
        ${f[M.assigned]?`<span class="tag past">${esc(sel(f[M.assigned]))}</span>`:''}
      </div>
    </div>`;}).join('');
}

function render(){
  const app=document.getElementById('app');
  if(ERR){app.innerHTML='<div class="err">'+esc(ERR)+'</div>';return;}
  if(!BOOKINGS.length&&!CLEANINGS.length){app.innerHTML='<div class="loading">…</div>';return;}
  app.innerHTML=TAB==='stays'?staysBody():repairsBody();
}
applyLang();
load();
</script>
</body>
</html>
