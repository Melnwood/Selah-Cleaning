<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>SELAH · Rezervace – správa</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#e9ede6;--panel:#fff;--panel2:#f5f8f2;--ink:#1b2a22;--soft:#54655a;--line:#d6ddd2;
  --spruce:#1f3a2e;--pine:#2f5d4a;--pine2:#3c7359;--amber:#a56c15;--amberbg:#f5ead2;
  --barn:#a2372a;--barnbg:#f4ddd6;--done:#2f6b4c;--donebg:#dbeee0;--pend:#b07d12;--pendbg:#f6ecd2;
}
*{box-sizing:border-box}
[hidden]{display:none!important}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.45}
.wrap{max-width:720px;margin:0 auto;padding:0 16px 80px}
.en-only{display:none}
body.lang-en .en-only{display:inline}
body.lang-en .cs-only{display:none}
.langtog{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;flex:none}
.langtog button{font:inherit;font-weight:700;font-size:12px;padding:6px 12px;border:0;background:transparent;color:var(--soft);cursor:pointer}
.langtog button.on{background:var(--spruce);color:#fff}
header{padding:18px 0 10px;border-bottom:1px solid var(--line);margin-bottom:8px}
.brand{display:flex;align-items:center;gap:10px}
.roof{width:26px;height:26px;flex:none}
.roof path{fill:none;stroke:var(--spruce);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.mark{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11px;letter-spacing:.24em;color:var(--amber);line-height:1;margin-bottom:4px}
.brand h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;margin:0;line-height:1.1}
.brand .sub{font-size:12px;color:var(--soft);margin-top:3px}
.brand .txt{flex:1;min-width:0}
.sumrow{display:flex;gap:8px;margin:14px 0 4px}
.sum{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:11px 13px;text-align:center}
.sum .n{font-family:'Space Mono',monospace;font-weight:700;font-size:22px;line-height:1}
.sum .l{font-size:10.5px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin-top:4px}
.sum.pend .n{color:var(--pend)} .sum.ok .n{color:var(--done)}
.filters{display:flex;gap:6px;margin:10px 0 4px;overflow-x:auto}
.filt{font:inherit;font-weight:600;font-size:13px;white-space:nowrap;padding:7px 13px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--soft);cursor:pointer}
.filt.sel{background:var(--spruce);border-color:var(--spruce);color:#fff}
.monthhdr{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px;color:var(--pine);margin:18px 0 8px;padding-bottom:5px;border-bottom:2px solid var(--line);text-transform:capitalize}

.bk{background:var(--panel);border:1px solid var(--line);border-radius:15px;padding:15px 16px;margin:10px 0;scroll-margin-top:14px;box-shadow:0 2px 6px rgba(20,30,24,.07)}
.bk.declined{background:#e9ece7;border-color:#d3dacf;box-shadow:none}
.bk.declined .dates,.bk.declined .who,.bk.declined .meta,.bk.declined .cost{color:var(--soft)}
.bk.declined .meta .cost{opacity:.7}
.bk.flash{animation:flash 2s ease}
@keyframes flash{0%,40%{box-shadow:0 0 0 3px var(--amber)}100%{box-shadow:none}}
.bk .top{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.bk .dates{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px}
.bk .who{font-size:13.5px;color:var(--soft);margin-top:2px}
.badge{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;padding:3px 9px;border-radius:999px;white-space:nowrap;flex:none}
.badge.req{background:var(--pendbg);color:var(--pend)} .badge.ok{background:var(--donebg);color:var(--done)} .badge.no{background:var(--barnbg);color:var(--barn)}
.badge.cal{background:#e6eef5;color:#2f5d7a}
.notice-cal{background:#eef3f7;border:1px dashed #b8ccd9;color:#3a5a70;border-radius:11px;padding:10px 12px;font-size:12.5px;margin-bottom:10px}
.meta{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:10px;font-size:13px}
.meta b{font-weight:700}
.cost{font-family:'Space Mono',monospace;font-weight:700;color:var(--amber)}
.conflict{background:var(--barnbg);color:#7a281d;border-radius:9px;padding:7px 10px;font-size:12.5px;margin-top:9px;font-weight:600}
details{margin-top:10px;border-top:1px dashed var(--line);padding-top:9px}
details summary{cursor:pointer;font-size:13px;color:var(--pine);font-weight:600;list-style:none}
details summary::-webkit-details-marker{display:none}
details summary::before{content:"▸ ";}
details[open] summary::before{content:"▾ ";}
.kv{display:grid;grid-template-columns:auto 1fr;gap:5px 12px;font-size:13px;margin-top:9px}
.kv .k{color:var(--soft)}
.guestbox{white-space:pre-wrap;background:var(--panel2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;font-size:13px;margin-top:4px}
.caltitle{display:flex;gap:8px;align-items:center;margin-top:10px;background:var(--panel2);border:1px dashed var(--line);border-radius:9px;padding:8px 10px}
.caltitle code{font-family:'Space Mono',monospace;font-size:12.5px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.caltitle button{font:inherit;font-size:11.5px;font-weight:600;color:var(--pine);background:#fff;border:1px solid var(--line);border-radius:8px;padding:5px 9px;cursor:pointer;flex:none}
.actions{display:flex;gap:8px;margin-top:13px}
.btn{font:inherit;font-weight:700;font-size:14px;border-radius:11px;padding:12px;cursor:pointer;border:1px solid transparent;flex:1}
.btn.accept{background:var(--spruce);color:#fff}
.btn.decline{background:#fff;border-color:var(--line);color:var(--barn);flex:none;padding:12px 16px}
.btn.edit{background:#eef1ec;border-color:var(--line);color:var(--pine);flex:none;padding:12px 14px}
.costbreak{font-family:'Space Mono',monospace;font-size:12px;color:var(--soft);margin-top:7px}
.btn:disabled{opacity:.5;cursor:default}
.mail{font-size:12.5px;color:var(--pine2);text-decoration:none;font-weight:600}
.empty{color:var(--soft);text-align:center;padding:34px 10px}
.loading{color:var(--soft);text-align:center;padding:48px}
.err{background:var(--barnbg);border:1px solid var(--barn);color:#7a281d;border-radius:12px;padding:14px;margin:14px 0}
.foot{font-size:11.5px;color:var(--soft);margin-top:18px;text-align:center}
.toast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%);background:var(--spruce);color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;border-radius:11px;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:80;max-width:90%;text-align:center}
.reportbtn{margin-top:10px;width:100%;font:inherit;font-weight:700;font-size:14px;color:#fff;background:var(--pine);border:0;border-radius:11px;padding:12px;cursor:pointer}
#repModal{position:fixed;inset:0;z-index:70;background:rgba(20,30,24,.5);display:none;align-items:flex-end;justify-content:center}
#editModal{position:fixed;inset:0;z-index:72;background:rgba(20,30,24,.5);display:none;align-items:flex-end;justify-content:center}
#editModal.show{display:flex}
@media(min-width:640px){#editModal{align-items:center;padding:16px}}
.editbody{padding:14px 16px;overflow:auto;display:grid;gap:12px}
.efield{display:flex;flex-direction:column;gap:5px}
.efield label{font-size:11px;text-transform:uppercase;letter-spacing:.03em;color:var(--soft);font-weight:700}
.efield input[type=text],.efield input[type=number],.efield input[type=date],.efield select,.efield textarea{font:inherit;font-size:14px;padding:10px 11px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);width:100%}
.efield textarea{min-height:64px;resize:vertical}
.efield.chk{flex-direction:row;align-items:center;gap:9px}
.efield.chk input{width:20px;height:20px}
.efield.chk label{text-transform:none;font-size:13.5px;letter-spacing:0}
.editfoot{position:sticky;bottom:0;background:#fff;display:flex;gap:10px;padding:12px 16px;border-top:1px solid var(--line)}
#repModal.show{display:flex}
@media(min-width:640px){#repModal{align-items:center;padding:16px}}
.repsheet{background:#fff;width:100%;max-width:780px;max-height:92vh;overflow:auto;border-radius:16px 16px 0 0}
@media(min-width:640px){.repsheet{border-radius:16px}}
.rephead{position:sticky;top:0;background:#fff;display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);z-index:2}
.rephead .title{flex:1;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px}
.repactions{display:flex;gap:6px}
.repactions button{font:inherit;font-size:12.5px;font-weight:600;border:1px solid var(--line);background:#fff;color:var(--pine);border-radius:9px;padding:7px 11px;cursor:pointer}
.repbody{padding:12px 16px 20px}
.reptable{width:100%;border-collapse:collapse;font-size:12.5px}
.reptable th{text-align:left;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em;color:var(--soft);padding:6px 8px;border-bottom:1px solid var(--line)}
.reptable td{padding:8px;border-bottom:1px solid var(--line);vertical-align:top}
.reptable .r{text-align:right;font-family:'Space Mono',monospace;white-space:nowrap}
.repsec{font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:14px;color:var(--ink);margin:16px 0 8px;padding-bottom:4px;border-bottom:2px solid var(--line)}
.repsec:first-child{margin-top:2px}
.reptotal{margin-top:12px;font-size:13px;font-weight:700;text-align:right}
@media print{.wrap,#toast,.reportbtn{display:none!important}#repModal{position:static;display:block!important;background:#fff}#repModal .repactions{display:none}.repsheet{max-height:none;box-shadow:none;border-radius:0}}
@media (prefers-reduced-motion:reduce){*{animation:none!important}}
.backlink{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--pine2,#2f5d4a);text-decoration:none;margin:0 0 12px}
.backlink:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <a href="/" class="backlink">← <span class="cs-only">Nabídka</span><span class="en-only">Menu</span></a>
    <div class="brand">
      <svg class="roof" viewBox="0 0 28 28" aria-hidden="true"><path d="M3 15 L14 5 L25 15 M6 13 V24 H22 V13"/></svg>
      <div class="txt">
        <div class="mark">SELAH</div>
        <h1><span class="cs-only">Rezervace — správa</span><span class="en-only">Bookings — review</span></h1>
        <div class="sub"><span class="cs-only">Následující 3 měsíce · přijměte nebo zamítněte žádosti</span><span class="en-only">Next 3 months · accept or decline requests</span></div>
      </div>
      <div class="langtog" role="group" aria-label="Jazyk / Language"><button type="button" id="btnCs">CZ</button><button type="button" id="btnEn">EN</button></div>
    </div>
    <div class="sumrow" id="sumrow"></div>
    <div class="filters" id="filters"></div>
    <button type="button" id="reportBtn" class="reportbtn">📊 <span class="cs-only">Report pro účetní</span><span class="en-only">Accountant report</span></button>
  </header>
  <div id="app"><div class="loading">…</div></div>
  <div class="foot" id="foot"></div>
</div>
<div id="toast" class="toast" hidden></div>
<div id="repModal">
  <div class="repsheet">
    <div class="rephead">
      <div class="title"><span class="cs-only">Report pro účetní</span><span class="en-only">Accountant report</span></div>
      <div class="repactions">
        <button type="button" id="repCopy"><span class="cs-only">Kopírovat</span><span class="en-only">Copy</span></button>
        <button type="button" id="repPrint"><span class="cs-only">Tisk</span><span class="en-only">Print</span></button>
        <button type="button" id="repClose">✕</button>
      </div>
    </div>
    <div class="repbody" id="repBody"></div>
  </div>
</div>

<div id="editModal">
  <div class="repsheet">
    <div class="rephead">
      <div class="title" id="editTitle"></div>
      <button type="button" id="editClose">✕</button>
    </div>
    <div class="editbody" id="editBody"></div>
    <div class="editfoot">
      <button type="button" class="btn accept" id="editSave">💾 <span class="cs-only">Uložit</span><span class="en-only">Save</span></button>
      <button type="button" class="btn decline" id="editCancel"><span class="cs-only">Zrušit</span><span class="en-only">Cancel</span></button>
    </div>
  </div>
</div>

<script>
const API='/.netlify/functions/airtable';
const F={bookedBy:'fldkrWGTZO9xH3tUg',space:'fldUYaGvdvcV3EZOM',checkin:'fldpmuL8HMEl49AaY',checkout:'fld6qnW9lBTsRze3u',
  party:'fldRuksM0SOYRaJOS',guests:'fldCv5Z6JFuNuNC3G',email:'fldgNjaFIzrrXFtGp',phone:'fld1jHbXT1sLuGYfm',
  team:'fldO7Wq8cW5Pnifbf',purpose:'fld01hHE2rz4WEnFU',reason:'fldRapIBVEQ7hYL7c',agreed:'fldSRBYqWROkfWvga',
  signature:'fldrTq35YqRfKXXB5',status:'fldpaz8B5NbPQ46pR',submitted:'fldmEZN27QcX4UxPV',payment:'fldHvsV5XaIiSm5hl',acct:'fldGUaa6bMqkISP4e',
  collected:'fldnxBOu0XpYQNR83',collectedDate:'fldu7w8wlmCLqsG5a'};
const RATES={bed:15,util:15,house:50,apt:25};
const ST={REQ:'Požadováno (Requested)',OK:'Schváleno (Approved)',NO:'Zamítnuto (Declined)'};
let RAW=[],CAL=[],CAL_ERR=null,FILTER='all';
let LANG=localStorage.getItem('cabin_lang')||'cs';
const HL=new URLSearchParams(location.search).get('id');
function T(cs,en){return LANG==='en'?en:cs;}
function locale(){return LANG==='en'?'en-GB':'cs-CZ';}
function hdr(){const c=localStorage.getItem('cabin_code')||'';return c?{'Content-Type':'application/json','x-access-code':c}:{'Content-Type':'application/json'};}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function sel(v){return v&&typeof v==='object'?v.name:v;}
function stKey(s){s=sel(s)||ST.REQ;if(s.startsWith('Schvál'))return 'ok';if(s.startsWith('Zamít'))return 'no';return 'req';}
function d(s){return s?new Date(s):null;}
function human(s){return s?new Date(s).toLocaleDateString(locale(),{weekday:'short',day:'numeric',month:'short'}):'—';}
function nights(f){const a=d(f[F.checkin]),b=d(f[F.checkout]);return a&&b?Math.max(0,Math.round((b-a)/86400000)):0;}
function monthKey(s){const x=new Date(s);return x.getFullYear()+'-'+String(x.getMonth()+1).padStart(2,'0');}
function monthLabel(k){const[y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleDateString(locale(),{month:'long',year:'numeric'});}

function applyLang(){
  document.body.classList.toggle('lang-en',LANG==='en');document.documentElement.lang=LANG;
  document.getElementById('btnCs').classList.toggle('on',LANG==='cs');
  document.getElementById('btnEn').classList.toggle('on',LANG==='en');
  if(RAW.length||document.getElementById('filters').children.length)render();
}
document.getElementById('btnCs').onclick=()=>{LANG='cs';localStorage.setItem('cabin_lang','cs');applyLang();};
document.getElementById('btnEn').onclick=()=>{LANG='en';localStorage.setItem('cabin_lang','en');applyLang();};

async function load(){
  try{
    const r=await fetch(API+'?t=bookings',{headers:hdr()});
    if(r.status===401){const c=prompt('Access code');if(c){localStorage.setItem('cabin_code',c);location.reload();}return;}
    const {records=[]}=await r.json();
    RAW=records;
    try{
      const cr=await fetch(API,{method:'POST',headers:hdr(),body:JSON.stringify({action:'rentals',days:calDays()})});
      const cdata=await cr.json();
      CAL_ERR=cdata.error||null;
      CAL=buildCalBookings(cdata.rentals);
    }catch(e){CAL_ERR='fetch';CAL=[];}
    render();
    if(new URLSearchParams(location.search).has('report'))renderReport();
  }catch(e){document.getElementById('app').innerHTML='<div class="err">'+T('Nepodařilo se načíst rezervace: ','Could not load bookings: ')+esc(e.message||e)+'</div>';}
}
const CAL_SKIP=/^(blocked|booked|book d|massage|selah deep clean|selah billing|get ?meds|mel.s meds|mel’s meds)/i;
function calDays(){return Math.max(30,Math.ceil((windowEnd()-new Date())/86400000)+3);}
function buildCalBookings(items){
  const out=[];
  for(const ev of (items||[])){
    const s=ev.start&&ev.start.date, e=ev.end&&ev.end.date;
    if(!s||!e)continue;
    const sum=(ev.summary||'').trim();
    if(!sum||CAL_SKIP.test(sum))continue;
    const pm=sum.match(/\((\d+)\)/), am=sum.match(/#\s*([A-Za-z0-9\/\-]+)/);
    out.push({id:'cal_'+(ev.id||(s+e)),source:'calendar',fields:{
      [F.bookedBy]:sum.split('#')[0].trim(),[F.checkin]:s,[F.checkout]:e,
      [F.party]:pm?pm[1]:'',[F.acct]:am?am[1]:''}});
  }
  return out;
}
function combined(){
  // Airtable bookings win, but pull the JV account # from a calendar event with the same check-in
  // (Google all-day events end the day AFTER checkout, so we match on check-in, not checkout).
  const merged=RAW.map(b=>{
    if(b.fields[F.acct])return b;
    const c=CAL.find(c=>c.fields[F.checkin]===b.fields[F.checkin]&&c.fields[F.acct]&&!/^cash$/i.test(c.fields[F.acct]));
    return c?{...b,fields:{...b.fields,[F.acct]:c.fields[F.acct]}}:b;
  });
  const cal=CAL.filter(c=>!RAW.some(b=>b.fields[F.checkin]===c.fields[F.checkin]));
  return merged.concat(cal);
}

function windowStart(){const n=new Date();return new Date(n.getFullYear(),n.getMonth(),1);}
function windowEnd(){const s=windowStart();return new Date(s.getFullYear(),s.getMonth()+3,1);}
function inWindow(rec){const ci=d(rec.fields[F.checkin]);return ci&&ci>=windowStart()&&ci<windowEnd();}

function costOf(f){
  const party=+f[F.party]||0;
  const cribs=(f[F.guests]||'').split('\n').filter(Boolean).filter(g=>/crib|postýlka/i.test(g)).length;
  const beds=Math.max(0,party-cribs);
  const both=/apartm|Apartment/i.test(sel(f[F.space])||'');
  return RATES.bed*beds*nights(f)+RATES.util*nights(f)+RATES.house+(both?RATES.apt:0);
}
function money2(v){return '$'+(Math.round(v*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});}
function costParts(f){const total=costOf(f);const ppl=+f[F.party]||0;const n=nights(f)||0;return {total,pp:ppl?total/ppl:null,ppn:(ppl&&n)?total/(ppl*n):null};}
function overlaps(a,b){const a1=d(a[F.checkin]),a2=d(a[F.checkout]),b1=d(b[F.checkin]),b2=d(b[F.checkout]);return a1&&a2&&b1&&b2&&a1<b2&&b1<a2;}
function calTitle(f){
  const last=(f[F.bookedBy]||'').trim().split(/\s+/).pop()||f[F.bookedBy]||'';
  const acct=sel(f[F.payment])&&/Cash|Hotov/i.test(sel(f[F.payment]))?'#cash':(f[F.acct]?'#'+f[F.acct]:'');
  return `${last} (${f[F.party]||'?'}) ${acct}`.trim();
}

function render(){
  const all=combined();
  const win=all.filter(inWindow);
  const pend=win.filter(x=>x.source!=='calendar'&&stKey(x.fields[F.status])==='req').length;
  const confN=win.filter(x=>x.source==='calendar'||stKey(x.fields[F.status])==='ok').length;
  document.getElementById('sumrow').innerHTML=`
    <div class="sum"><div class="n">${win.length}</div><div class="l">${T('Ve výhledu','In window')}</div></div>
    <div class="sum pend"><div class="n">${pend}</div><div class="l">${T('Čeká','Pending')}</div></div>
    <div class="sum ok"><div class="n">${confN}</div><div class="l">${T('Potvrzeno','Confirmed')}</div></div>`;
  const F2=[['all',T('Vše','All')],['req',T('Čeká','Pending')],['ok',T('Potvrzeno','Confirmed')],['no',T('Zamítnuto','Declined')]];
  document.getElementById('filters').innerHTML=F2.map(([k,l])=>`<button class="filt ${FILTER===k?'sel':''}" data-f="${k}">${l}</button>`).join('');
  document.querySelectorAll('.filt').forEach(b=>b.onclick=()=>{FILTER=b.dataset.f;render();});

  let list=all.filter(inWindow);
  if(HL&&!list.find(x=>x.id===HL)){const extra=all.find(x=>x.id===HL);if(extra)list=[extra,...list];}
  if(FILTER==='req')list=list.filter(x=>x.source!=='calendar'&&stKey(x.fields[F.status])==='req');
  else if(FILTER==='ok')list=list.filter(x=>x.source==='calendar'||stKey(x.fields[F.status])==='ok');
  else if(FILTER==='no')list=list.filter(x=>x.source!=='calendar'&&stKey(x.fields[F.status])==='no');
  list.sort((a,b)=>d(a.fields[F.checkin])-d(b.fields[F.checkin]));

  const app=document.getElementById('app');
  const confirmed=all.filter(x=>x.source==='calendar'||stKey(x.fields[F.status])==='ok');
  let head='';
  if(CAL_ERR==='no_calendar'||CAL_ERR==='no_key')head=`<div class="notice-cal">📅 ${T('Kalendář Selah zatím není připojen — zobrazují se jen žádosti z formuláře.','The Selah calendar isn\'t connected yet — showing form requests only.')}</div>`;
  else if(CAL_ERR)head=`<div class="conflict" style="margin:0 0 10px">⚠ ${T('Kalendář se nepodařilo načíst — potvrzené rezervace nemusí být zobrazeny.','Couldn\'t load the calendar — confirmed bookings may be missing.')}</div>`;
  if(!list.length){app.innerHTML=head+`<div class="empty">${T('Žádné rezervace v tomto výhledu.','No bookings in this window.')}</div>`;document.getElementById('foot').textContent='';return;}
  let html=head,curMonth='';
  list.forEach(x=>{
    const f=x.fields, mk=monthKey(f[F.checkin]);
    if(mk!==curMonth){curMonth=mk;html+=`<div class="monthhdr">${monthLabel(mk)}</div>`;}
    if(x.source==='calendar'){html+=calCard(x,confirmed);return;}
    const k=stKey(f[F.status]);
    const badge=k==='ok'?`<span class="badge ok">✓ ${T('SCHVÁLENO','APPROVED')}</span>`:k==='no'?`<span class="badge no">${T('ZAMÍTNUTO','DECLINED')}</span>`:`<span class="badge req">${T('ČEKÁ','PENDING')}</span>`;
    const conf=confirmed.filter(o=>o.id!==x.id&&overlaps(f,o.fields)).map(o=>o.fields[F.bookedBy]);
    const pay=sel(f[F.payment])||'—';const isCash=/Cash|Hotov/i.test(pay);
    html+=`<div class="bk ${k==='no'?'declined':''} ${x.id===HL?'flash':''}" id="bk_${x.id}" data-id="${x.id}">
      <div class="top">
        <div><div class="dates">${human(f[F.checkin])} → ${human(f[F.checkout])}</div>
          <div class="who">${esc(f[F.bookedBy]||'—')} · ${nights(f)} ${T('nocí','nights')}</div></div>
        ${badge}
      </div>
      <div class="meta">
        <span>🏠 ${esc(/apartm|Apartment/i.test(sel(f[F.space])||'')?T('Dům + apartmán','House + apt'):T('Hlavní dům','Main house'))}</span>
        <span>👥 ${esc(f[F.party]||'?')}</span>
        <span class="cost">${'$'+costOf(f).toLocaleString('en-US')}</span>
        <span>💳 ${isCash?T('hotově','cash'):(f[F.acct]?'#'+esc(f[F.acct]):T('JV účet','JV account'))}</span>
      </div>
      ${(()=>{const cp=costParts(f);return `<div class="costbreak">${money2(cp.total)} ${T('celkem','total')}${cp.pp!=null?' · '+money2(cp.pp)+' / '+T('osoba','person'):''}${cp.ppn!=null?' · '+money2(cp.ppn)+' / '+T('osoba·noc','person·night'):''}</div>`;})()}
      ${conf.length?`<div class="conflict">⚠ ${T('Překrývá se s potvrzenou rezervací','Overlaps a confirmed booking')}: ${esc(conf.join(', '))}</div>`:''}
      <details>
        <summary>${T('Podrobnosti','Details')}</summary>
        <div class="kv"><span class="k">${T('Hosté','Guests')}</span><span></span></div>
        <div class="guestbox">${esc(f[F.guests]||'—')}</div>
        <div class="kv">
          <span class="k">${T('Účel','Purpose')}</span><span>${esc(sel(f[F.purpose])||'—')}</span>
          ${f[F.reason]?`<span class="k">${T('Důvod','Reason')}</span><span>${esc(f[F.reason])}</span>`:''}
          <span class="k">${T('Platba','Payment')}</span><span>${esc(pay)}${f[F.acct]?' · #'+esc(f[F.acct]):''}</span>
          <span class="k">${T('JV tým','JV team')}</span><span>${esc(f[F.team]||'—')}</span>
          <span class="k">${T('Kontakt','Contact')}</span><span><a class="mail" href="mailto:${esc(f[F.email]||'')}">${esc(f[F.email]||'—')}</a>${f[F.phone]?' · '+esc(f[F.phone]):''}</span>
          <span class="k">${T('Pravidla','Rules')}</span><span>${f[F.agreed]?'✓ '+T('podepsáno','signed')+' — '+esc(f[F.signature]||''):'—'}</span>
          <span class="k">${T('Odesláno','Submitted')}</span><span>${f[F.submitted]?new Date(f[F.submitted]).toLocaleString(locale()):'—'}</span>
        </div>
        <div class="caltitle"><code>${esc(calTitle(f))}</code><button type="button" data-copy="${esc(calTitle(f))}">${T('Kopírovat pro kalendář','Copy for calendar')}</button></div>
      </details>
      <div class="actions">
        <button class="btn edit" data-edit="${x.id}">✏️ ${T('Upravit','Edit')}</button>
        ${k==='req'?`<button class="btn accept" data-accept="${x.id}">✓ ${T('Přijmout','Accept')}</button><button class="btn decline" data-decline="${x.id}">${T('Zamítnout','Decline')}</button>`
          :k==='ok'?`<button class="btn decline" data-decline="${x.id}">${T('Zrušit schválení','Undo approval')}</button>`
          :`<button class="btn accept" data-accept="${x.id}">✓ ${T('Přesto přijmout','Accept after all')}</button>`}
      </div>
    </div>`;
  });
  app.innerHTML=html;
  wire();
  if(HL){const el=document.getElementById('bk_'+HL);if(el)el.scrollIntoView({behavior:'smooth',block:'center'});}
  document.getElementById('foot').textContent=`${T('Okno','Window')}: ${windowStart().toLocaleDateString(locale(),{month:'short',year:'numeric'})} – ${new Date(windowEnd()-1).toLocaleDateString(locale(),{month:'short',year:'numeric'})}`;
}
function calCard(x,confirmed){
  const f=x.fields;
  const conf=confirmed.filter(o=>o.id!==x.id&&overlaps(f,o.fields)).map(o=>o.fields[F.bookedBy]);
  return `<div class="bk ${x.id===HL?'flash':''}" id="bk_${x.id}" data-id="${x.id}">
    <div class="top">
      <div><div class="dates">${human(f[F.checkin])} → ${human(f[F.checkout])}</div>
        <div class="who">${esc(f[F.bookedBy]||'—')} · ${nights(f)} ${T('nocí','nights')}</div></div>
      <span class="badge cal">📅 ${T('V KALENDÁŘI','ON CALENDAR')}</span>
    </div>
    <div class="meta">
      ${f[F.party]?`<span>👥 ${esc(f[F.party])}</span>`:''}
      ${f[F.acct]?`<span>💳 #${esc(f[F.acct])}</span>`:''}
    </div>
    ${conf.length?`<div class="conflict">⚠ ${T('Překrývá se s jinou rezervací','Overlaps another booking')}: ${esc(conf.join(', '))}</div>`:''}
    <div style="font-size:12px;color:var(--soft);margin-top:10px">${T('Potvrzeno v kalendáři Selah. Úpravy proveďte přímo v Google Kalendáři.','Confirmed on the Selah Calendar. Edit in Google Calendar.')}</div>
  </div>`;
}

function wire(){
  document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>openEdit(b.dataset.edit));
  document.querySelectorAll('[data-accept]').forEach(b=>b.onclick=()=>setStatus(b.dataset.accept,ST.OK,b));
  document.querySelectorAll('[data-decline]').forEach(b=>b.onclick=()=>setStatus(b.dataset.decline,ST.NO,b));
  document.querySelectorAll('[data-copy]').forEach(b=>b.onclick=()=>{navigator.clipboard&&navigator.clipboard.writeText(b.dataset.copy);const t=b.textContent;b.textContent=T('Zkopírováno ✓','Copied ✓');setTimeout(()=>b.textContent=t,1500);});
}
async function setStatus(id,status,btn){
  const rec=RAW.find(x=>x.id===id);if(!rec)return;
  btn.disabled=true;const t=btn.textContent;btn.textContent='…';
  try{
    const r=await fetch(API,{method:'POST',headers:hdr(),body:JSON.stringify({action:'bookingStatus',id,status})});
    const data=await r.json();
    if(!r.ok)throw new Error((data.error&&data.error.message)||data.error||'Error');
    rec.fields=Object.assign({},rec.fields,{[F.status]:status});
    render();
    if(data.calendar==='created')toast(T('Přidáno do kalendáře Selah ✓','Added to the Selah Calendar ✓'));
    else if(data.calendar==='removed')toast(T('Odebráno z kalendáře Selah','Removed from the Selah Calendar'));
    else if(data.calendar&&String(data.calendar).startsWith('error'))toast(T('Uloženo, ale kalendář se nepodařilo aktualizovat.','Saved — but the calendar update failed.'));
  }catch(e){btn.disabled=false;btn.textContent=t;alert(T('Uložení selhalo: ','Save failed: ')+(e.message||e));}
}
let toastT;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.hidden=false;clearTimeout(toastT);toastT=setTimeout(()=>el.hidden=true,2800);}

// ---- Accountant report ----
function payLabel(p){if(!p)return '—';if(/Cash|Hotov/i.test(p))return T('Hotově','Cash');if(/account|účet/i.test(p))return T('JV účet','JV account');return p;}
function reportRows(){
  const list=combined().filter(inWindow).filter(x=>x.source==='calendar'||stKey(x.fields[F.status])!=='no');
  list.sort((a,b)=>d(a.fields[F.checkin])-d(b.fields[F.checkin]));
  return list.map(x=>{
    const f=x.fields, isCal=x.source==='calendar';
    const rawAcct=f[F.acct]||'';
    const isCash=isCal?/cash/i.test(rawAcct):/Cash|Hotov/i.test(sel(f[F.payment])||'');
    const acctNum=isCash?'':rawAcct;
    const account=isCash?T('Hotově','Cash'):(isCal?(acctNum?T('JV účet','JV account'):'—'):payLabel(sel(f[F.payment])));
    const amount=isCal?0:costOf(f);
    const reason=isCal?'':[sel(f[F.purpose])||'',f[F.reason]||''].filter(Boolean).join(' — ');
    return {name:f[F.bookedBy]||'',dates:human(f[F.checkin])+' → '+human(f[F.checkout]),account,acct:acctNum,amount,amountStr:isCal?'':('$'+amount.toLocaleString('en-US')),reason,cash:isCash,checkin:f[F.checkin]||''};
  });
}
const fxCache={};
async function getRate(dateISO){
  if(dateISO in fxCache)return fxCache[dateISO];
  try{
    const r=await fetch(API,{method:'POST',headers:hdr(),body:JSON.stringify({action:'fx',date:dateISO})});
    const data=await r.json();
    fxCache[dateISO]=(data&&typeof data.rate==='number')?data.rate:null;
  }catch(e){fxCache[dateISO]=null;}
  return fxCache[dateISO];
}
let LAST_REPORT={jv:[],cash:[]};
function winNote(){return `${T('Období','Window')}: ${windowStart().toLocaleDateString(locale(),{day:'numeric',month:'short',year:'numeric'})} – ${new Date(windowEnd()-1).toLocaleDateString(locale(),{day:'numeric',month:'short',year:'numeric'})}`;}
async function renderReport(){
  const bodyEl=document.getElementById('repBody');
  document.getElementById('repModal').classList.add('show');
  const rows=reportRows();
  const jv=rows.filter(r=>!r.cash), cash=rows.filter(r=>r.cash);
  const today=new Date().toISOString().slice(0,10);
  cash.forEach(r=>{const has=r.checkin&&r.checkin<=today;r.rateDate=has?r.checkin:today;r.estimate=!has;});
  if(cash.length)bodyEl.innerHTML=`<div class="empty">${T('Načítám kurzy ČNB…','Loading ČNB rates…')}</div>`;
  await Promise.all([...new Set(cash.map(r=>r.rateDate).filter(Boolean))].map(getRate));
  cash.forEach(r=>{const rate=fxCache[r.rateDate];r.rate=rate;r.czk=(rate&&r.amount)?Math.round(r.amount*rate):null;});
  LAST_REPORT={jv,cash};
  const jvTotal=jv.reduce((s,r)=>s+(r.amount||0),0);
  const cashUsd=cash.reduce((s,r)=>s+(r.amount||0),0);
  const cashCzk=cash.reduce((s,r)=>s+(r.czk||0),0);
  const kc=n=>n.toLocaleString('cs-CZ')+' Kč';
  let html='';
  html+=`<div class="repsec">💳 ${T('JV účty','JV accounts')}</div>`;
  if(jv.length){
    html+=`<table class="reptable"><tr><th>${T('Jméno','Name')}</th><th>${T('Termín','Dates')}</th><th>${T('Číslo JV účtu','JV account #')}</th><th class="r">${T('Částka','Amount')}</th></tr>`
      +jv.map(r=>`<tr><td>${esc(r.name)}</td><td>${esc(r.dates)}</td><td>${esc(r.acct||'—')}</td><td class="r">${esc(r.amountStr||'—')}</td></tr>`).join('')
      +`</table><div class="reptotal">${T('Celkem JV účty','JV total')}: $${jvTotal.toLocaleString('en-US')}</div>`;
  } else html+=`<div class="empty">${T('Žádné rezervace na JV účet.','No JV-account bookings.')}</div>`;
  html+=`<div class="repsec">💵 ${T('Hotovost','Cash')}</div>`;
  if(cash.length){
    html+=`<table class="reptable"><tr><th>${T('Jméno','Name')}</th><th>${T('Termín','Dates')}</th><th class="r">USD</th><th class="r">${T('Kurz','Rate')}</th><th class="r">CZK</th></tr>`
      +cash.map(r=>{const rateStr=r.rate?r.rate.toFixed(2)+(r.estimate?'*':''):'—';const czkStr=r.czk!=null?kc(r.czk):'—';return `<tr><td>${esc(r.name)}</td><td>${esc(r.dates)}</td><td class="r">${esc(r.amountStr||'—')}</td><td class="r">${rateStr}</td><td class="r">${czkStr}</td></tr>`;}).join('')
      +`</table><div class="reptotal">${T('Celkem hotovost','Cash total')}: $${cashUsd.toLocaleString('en-US')} · ${kc(cashCzk)}</div>`;
    html+=`<div style="font-size:11px;color:var(--soft);margin-top:4px">${T('CZK dle oficiálního kurzu ČNB v den příjezdu.','CZK at the official ČNB rate on the check-in date.')}${cash.some(r=>r.estimate)?' '+T('* odhad podle nejnovějšího kurzu — pobyt zatím nezačal.','* estimate using the latest rate — the stay hasn\'t started yet.'):''}</div>`;
  } else html+=`<div class="empty">${T('Žádné platby v hotovosti.','No cash bookings.')}</div>`;
  html+=`<div style="font-size:11px;color:var(--soft);margin-top:8px">${winNote()}. ${T('Rezervace jen z kalendáře nemají uloženou částku.','Calendar-only bookings have no stored amount.')}</div>`;
  bodyEl.innerHTML=rows.length?html:`<div class="empty">${T('Žádné rezervace ve výhledu.','No bookings in the window.')}</div>`;
}
function reportTSV(){
  const {jv,cash}=LAST_REPORT;const L=[];
  L.push(T('JV účty','JV accounts'));
  L.push([T('Jméno','Name'),T('Termín','Dates'),T('Číslo JV účtu','JV account #'),T('Částka USD','Amount USD')].join('\t'));
  jv.forEach(r=>L.push([r.name,r.dates,r.acct,r.amountStr].join('\t')));
  L.push('');L.push(T('Hotovost','Cash'));
  L.push([T('Jméno','Name'),T('Termín','Dates'),'USD',T('Kurz','Rate'),'CZK'].join('\t'));
  cash.forEach(r=>L.push([r.name,r.dates,r.amountStr,(r.rate?r.rate.toFixed(2):''),(r.czk!=null?r.czk:'')].join('\t')));
  return L.join('\n');
}
document.getElementById('reportBtn').onclick=renderReport;
document.getElementById('repClose').onclick=()=>document.getElementById('repModal').classList.remove('show');
document.getElementById('repPrint').onclick=()=>window.print();
document.getElementById('repCopy').onclick=()=>{const t=reportTSV();if(navigator.clipboard)navigator.clipboard.writeText(t).then(()=>toast(T('Zkopírováno ✓','Copied ✓')),()=>toast(T('Kopírování selhalo','Copy failed')));};
document.getElementById('repModal').addEventListener('click',e=>{if(e.target.id==='repModal')e.currentTarget.classList.remove('show');});

// ---- Edit booking (all fields; save gated by access code on the server) ----
const EDIT_FIELDS=[
 {f:F.bookedBy,cs:'Jméno',en:'Name',type:'text'},
 {f:F.status,cs:'Stav',en:'Status',type:'select',opts:['Požadováno (Requested)','Schváleno (Approved)','Zamítnuto (Declined)']},
 {f:F.space,cs:'Prostor',en:'Space',type:'select',opts:['Hlavní dům (Main house)','Hlavní dům + apartmán (Main house + Apartment)']},
 {f:F.checkin,cs:'Příjezd',en:'Check-in',type:'date'},
 {f:F.checkout,cs:'Odjezd',en:'Check-out',type:'date'},
 {f:F.party,cs:'Počet osob',en:'Party size',type:'number'},
 {f:F.guests,cs:'Hosté (jména)',en:'Guests (names)',type:'textarea'},
 {f:F.purpose,cs:'Účel',en:'Purpose',type:'select',opts:['Osobní / rodinný odpočinek (Personal / family rest)','Retreat / služba (Retreat / ministry)','Jiné (Other)']},
 {f:F.reason,cs:'Důvod',en:'Reason',type:'textarea'},
 {f:F.payment,cs:'Platba',en:'Payment',type:'select',opts:['JV účet (JV account)','Hotově (Cash)']},
 {f:F.acct,cs:'Číslo JV účtu',en:'JV account #',type:'text'},
 {f:F.team,cs:'JV tým / země',en:'JV team / country',type:'text'},
 {f:F.email,cs:'E-mail',en:'Email',type:'text'},
 {f:F.phone,cs:'Telefon',en:'Phone',type:'text'},
 {f:F.signature,cs:'Podpis',en:'Signature',type:'text'},
 {f:F.agreed,cs:'Souhlas s pravidly',en:'Rules agreed',type:'checkbox'},
 {f:F.collected,cs:'Inkasováno (poslední účtované)',en:'Collected (last charged)',type:'checkbox'},
];
let EDIT_ID=null;
function openEdit(id){
  const rec=RAW.find(x=>x.id===id);if(!rec)return;EDIT_ID=id;const f=rec.fields;
  document.getElementById('editTitle').textContent=T('Upravit: ','Edit: ')+(f[F.bookedBy]||T('Rezervace','Booking'));
  document.getElementById('editBody').innerHTML=EDIT_FIELDS.map(fd=>{
    const label=T(fd.cs,fd.en);
    if(fd.type==='checkbox')
      return `<div class="efield chk"><input type="checkbox" data-fid="${fd.f}" data-type="checkbox" id="ef_${fd.f}" ${f[fd.f]?'checked':''}><label for="ef_${fd.f}">${label}</label></div>`;
    if(fd.type==='select'){const cur=sel(f[fd.f])||'';
      return `<div class="efield"><label>${label}</label><select data-fid="${fd.f}" data-type="select"><option value=""></option>${fd.opts.map(o=>`<option value="${esc(o)}" ${cur===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;}
    const raw=f[fd.f]==null?'':f[fd.f];
    if(fd.type==='textarea')
      return `<div class="efield"><label>${label}</label><textarea data-fid="${fd.f}" data-type="text">${esc(raw)}</textarea></div>`;
    const it=fd.type==='number'?'number':(fd.type==='date'?'date':'text');
    const dv=fd.type==='date'?String(raw).slice(0,10):raw;
    return `<div class="efield"><label>${label}</label><input type="${it}" data-fid="${fd.f}" data-type="${fd.type}" value="${esc(dv)}"></div>`;
  }).join('');
  document.getElementById('editModal').classList.add('show');
}
async function saveEdit(){
  if(!EDIT_ID)return;
  const btn=document.getElementById('editSave');const t=btn.innerHTML;btn.disabled=true;btn.textContent='…';
  const fields={};
  document.querySelectorAll('#editBody [data-fid]').forEach(el=>{
    const fid=el.dataset.fid,type=el.dataset.type;
    if(type==='checkbox')fields[fid]=el.checked;
    else if(type==='number'){const v=String(el.value).trim();fields[fid]=v===''?null:(+v);}
    else fields[fid]=el.value;
  });
  try{
    const r=await fetch(API,{method:'PATCH',headers:hdr(),body:JSON.stringify({table:'bookings',id:EDIT_ID,fields})});
    if(r.status===401){toast(T('Chybný přístupový kód.','Wrong access code.'));btn.disabled=false;btn.innerHTML=t;return;}
    const data=await r.json();
    if(!r.ok)throw new Error((data.error&&data.error.message)||data.error||'Error');
    const rec=RAW.find(x=>x.id===EDIT_ID);if(rec&&data.fields)rec.fields=Object.assign({},rec.fields,data.fields);
    document.getElementById('editModal').classList.remove('show');
    toast(T('Uloženo ✓','Saved ✓'));render();
  }catch(e){toast(T('Uložení selhalo: ','Save failed: ')+(e.message||e));}
  btn.disabled=false;btn.innerHTML=t;
}
document.getElementById('editClose').onclick=()=>document.getElementById('editModal').classList.remove('show');
document.getElementById('editCancel').onclick=()=>document.getElementById('editModal').classList.remove('show');
document.getElementById('editSave').onclick=saveEdit;
document.getElementById('editModal').addEventListener('click',e=>{if(e.target.id==='editModal')e.currentTarget.classList.remove('show');});

applyLang();
load();
</script>
