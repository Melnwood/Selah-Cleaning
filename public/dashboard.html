<html lang="cs">

<title>SELAH · Přehled</title>

<style>
:root{
  --bg:#e9ede6;--panel:#fff;--panel2:#f5f8f2;--ink:#1b2a22;--soft:#54655a;--line:#d6ddd2;
  --spruce:#1f3a2e;--pine:#2f5d4a;--pine2:#3c7359;--amber:#a56c15;--amberbg:#f5ead2;
  --barn:#a2372a;--barnbg:#f4ddd6;--done:#2f6b4c;--prog:#b07d12;--open:#a2372a;--wont:#7c877e;--gold:#c6a24a;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg);color:var(--ink);font-family:Inter,system-ui,sans-serif;line-height:1.45}
.wrap{max-width:820px;margin:0 auto;padding:0 16px 80px}
.en-only{display:none}
body.lang-en .en-only{display:inline}
body.lang-en .cs-only{display:none}
.langtog{display:inline-flex;border:1px solid var(--line);border-radius:999px;overflow:hidden;background:#fff;flex:none}
.langtog button{font:inherit;font-weight:700;font-size:12px;padding:6px 12px;border:0;background:transparent;color:var(--soft);cursor:pointer}
.langtog button.on{background:var(--spruce);color:#fff}
header{padding:18px 0 8px;border-bottom:1px solid var(--line);margin-bottom:6px}
.brand{display:flex;align-items:center;gap:10px}
.roof{width:26px;height:26px;flex:none}
.roof path{fill:none;stroke:var(--spruce);stroke-width:2.4;stroke-linejoin:round;stroke-linecap:round}
.mark{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:11px;letter-spacing:.24em;color:var(--amber);line-height:1;margin-bottom:4px}
.brand h1{font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:19px;margin:0;line-height:1.1}
.brand .sub{font-size:12px;color:var(--soft);margin-top:3px}
.brand .txt{flex:1;min-width:0}
.periods{display:flex;gap:6px;margin:14px 0 2px;overflow-x:auto}
.period{font:inherit;font-weight:600;font-size:13px;white-space:nowrap;padding:8px 14px;border-radius:999px;border:1px solid var(--line);background:#fff;color:var(--soft);cursor:pointer}
.period.sel{background:var(--spruce);border-color:var(--spruce);color:#fff}

/* Headline KPIs */
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:14px 0}
@media(max-width:520px){.kpis{grid-template-columns:1fr;}}
.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:15px 16px;cursor:pointer;text-align:left;font:inherit;color:inherit;position:relative;transition:border-color .12s,transform .12s}
.kpi:hover{border-color:var(--pine2);transform:translateY(-1px)}
.kpi .num{font-family:'Space Mono',monospace;font-weight:700;font-size:27px;line-height:1}
.kpi .lbl{font-size:12px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin-top:6px}
.kpi .go{position:absolute;top:13px;right:14px;color:var(--pine2);font-size:14px;opacity:.5}
.kpi.rent .num{color:var(--pine)} .kpi.wo .num{color:var(--open)} .kpi.fine .num{color:var(--barn)}

/* Accordion sections */
.acc{background:var(--panel);border:1px solid var(--line);border-radius:16px;margin:12px 0;overflow:hidden}
.acc.open{border-color:var(--pine2)}
.acc-head{display:flex;align-items:center;gap:12px;width:100%;text-align:left;background:var(--panel);border:0;font:inherit;color:var(--ink);padding:16px;cursor:pointer}
.acc.open .acc-head{border-bottom:1px solid var(--line);background:var(--panel2)}
.acc-head .chev{width:15px;height:15px;flex:none;transition:transform .18s}
.acc.open .acc-head .chev{transform:rotate(90deg)}
.acc-head .chev path{stroke:var(--pine);stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round}
.acc-head .ico{width:26px;height:26px;border-radius:8px;display:grid;place-items:center;flex:none;font-size:15px}
.acc-head .ico.c{background:#eaf1ec}.acc-head .ico.m{background:var(--barnbg)}.acc-head .ico.p{background:var(--amberbg)}.acc-head .ico.u{background:#e6eef5}
.acc-head .h{flex:1;min-width:0;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:16px}
.acc-head .badge{font-family:'Space Mono',monospace;font-size:13px;font-weight:700;padding:3px 10px;border-radius:999px;background:#eef1ec;color:var(--soft);white-space:nowrap}
.acc-head .badge.warn{background:var(--barnbg);color:var(--barn)}
.acc-body{padding:14px 16px 16px}
.acc-body[hidden]{display:none}

.mini{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.ministat{flex:1;min-width:96px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:9px 12px}
.ministat .n{font-family:'Space Mono',monospace;font-weight:700;font-size:18px;line-height:1}
.ministat .l{font-size:10.5px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.ministat .n.pay{color:var(--amber)} .ministat .n.barn{color:var(--barn)} .ministat .n.done{color:var(--done)} .ministat .n.prog{color:var(--prog)}

table{width:100%;border-collapse:collapse;font-size:13.5px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--soft);font-weight:600;padding:0 8px 8px;border-bottom:1px solid var(--line)}
td{padding:10px 8px;border-bottom:1px solid var(--line)}
tr:last-child td{border-bottom:0}
td.n,th.n{text-align:right;font-family:'Space Mono',monospace}
tr.click{cursor:pointer} tr.click:hover td{background:var(--panel2)}
.mo{font-weight:600} .pay{color:var(--amber);font-weight:700} .fine{color:var(--barn);font-weight:700}
.chip2{display:inline-block;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.c-open{background:var(--barnbg);color:var(--open)} .c-prog{background:#f6ecd2;color:var(--prog)} .c-done{background:#dbeee0;color:var(--done)} .c-wont{background:#e7ebe7;color:var(--wont)}

.wolist{display:flex;flex-direction:column;gap:8px}
.woitem{display:flex;align-items:center;gap:11px;border:1px solid var(--line);border-radius:12px;padding:11px 13px;cursor:pointer;background:#fff}
.woitem:hover{border-color:var(--pine2)}
.woitem .ref{font-family:'Space Mono',monospace;font-size:12px;font-weight:700;color:var(--pine2);flex:none}
.woitem .txt{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:13.5px}
.woitem .age{font-family:'Space Mono',monospace;font-size:12px;color:var(--soft);white-space:nowrap;flex:none}
.woitem .age.old{color:var(--barn);font-weight:700}

.rentlist{display:flex;flex-direction:column;gap:8px}
.rent{display:flex;align-items:center;gap:12px;border:1px solid var(--line);border-radius:12px;padding:12px 13px;background:#fff}
.rent.click{cursor:pointer;transition:border-color .12s,background .12s}
.rent.click:hover{border-color:var(--pine2);background:var(--panel2)}
.card2.bk{cursor:pointer}
.rent .when{font-family:'Space Mono',monospace;font-size:12px;color:var(--soft);flex:none;width:96px}
.rent .nm{flex:1;min-width:0;font-weight:600;font-size:14px}
.rent .clean{font-family:'Space Mono',monospace;font-size:11.5px;color:var(--pine2);white-space:nowrap;flex:none}
.notice{font-size:12.5px;color:var(--soft);background:var(--panel2);border:1px dashed var(--line);border-radius:11px;padding:11px 12px}

.card2{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:13px 15px;margin:9px 0;cursor:pointer}
.card2:hover{border-color:var(--pine2)}
.card2 .r1{display:flex;justify-content:space-between;gap:10px;align-items:baseline}
.card2 .d{font-weight:700;font-size:14px}
.card2 .amt{font-family:'Space Mono',monospace;font-weight:700;font-size:14px;color:var(--amber);white-space:nowrap}
.card2 .meta{font-size:12px;color:var(--soft);margin-top:3px}
.paidpill{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;background:#dbeee0;color:var(--done)}
.unpaidpill{font-family:'Space Mono',monospace;font-size:10.5px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--barnbg);color:var(--barn)}
.empty{color:var(--soft);font-size:13px;text-align:center;padding:16px}
.loading{text-align:center;color:var(--soft);padding:48px}
.err{background:var(--barnbg);border:1px solid var(--barn);color:#7a281d;border-radius:12px;padding:14px;margin:14px 0}
.foot{font-size:11.5px;color:var(--soft);margin-top:18px;text-align:center}

/* Modal */
.modal{position:fixed;inset:0;z-index:60;background:rgba(20,30,24,.45);display:none;align-items:flex-end;justify-content:center}
.modal.show{display:flex}
@media(min-width:640px){.modal{align-items:center}}
.sheet{background:var(--bg);width:100%;max-width:640px;max-height:92vh;overflow-y:auto;border-radius:18px 18px 0 0;box-shadow:0 -8px 40px rgba(0,0,0,.2)}
@media(min-width:640px){.sheet{border-radius:18px}}
.sheethead{position:sticky;top:0;background:var(--bg);display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line);z-index:2}
.sheethead .back{font:inherit;font-weight:600;font-size:13px;color:var(--pine2);background:none;border:0;cursor:pointer;padding:4px 0}
.sheethead .title{flex:1;font-family:'Bricolage Grotesque',sans-serif;font-weight:700;font-size:15px}
.sheethead .close{font:inherit;font-size:20px;color:var(--soft);background:none;border:0;cursor:pointer;line-height:1;padding:0 4px}
.sheetbody{padding:14px 16px 24px}
.detail .grp{font-size:11px;color:var(--soft);text-transform:uppercase;letter-spacing:.04em;margin:12px 0 2px}
.detail .line{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px dashed var(--line);font-size:13.5px}
.detail .line:last-child{border-bottom:0}
.detail .line .v{font-family:'Space Mono',monospace;white-space:nowrap}
.detail .line.tot{border-top:1px solid var(--ink);border-bottom:0;margin-top:4px;padding-top:9px;font-weight:700}
.detail .line.tot .v{color:var(--amber)}
.detail .sec{margin-top:14px}
.adminlink{display:block;margin-top:16px;text-align:center;background:var(--spruce,#1f3a2e);color:#fff;text-decoration:none;font-weight:700;font-size:13.5px;padding:12px;border-radius:11px}
.detail .st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--pine);margin-bottom:7px}
.detail .box{background:var(--panel2);border:1px solid var(--line);border-radius:11px;padding:12px;font-size:14px;white-space:pre-wrap}
.detail .finebox{background:var(--barnbg);border-radius:10px;padding:10px 12px;font-size:12.5px;color:var(--barn);margin-top:8px}
.tl-item{position:relative;padding:0 0 10px 18px;font-size:13px}
.tl-item::before{content:"";position:absolute;left:4px;top:5px;width:8px;height:8px;border-radius:50%;background:var(--pine2)}
.tl-item::after{content:"";position:absolute;left:7px;top:13px;bottom:0;width:2px;background:var(--line)}
.tl-item:last-child::after{display:none}
.tl-item .d{font-family:'Space Mono',monospace;font-size:11px;color:var(--soft)}
.tl-item .au{font-weight:700}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:13.5px;margin:6px 0}
.kv .k{color:var(--soft)}
button:focus-visible,.woitem:focus-visible,.card2:focus-visible{outline:2px solid var(--pine2);outline-offset:2px}
@media (prefers-reduced-motion:reduce){*{transition:none!important}}
.backlink{display:inline-flex;align-items:center;gap:5px;font-size:12.5px;font-weight:600;color:var(--pine2,#2f5d4a);text-decoration:none;margin:0 0 12px}
.backlink:hover{text-decoration:underline}
.copybtn{width:100%;font:inherit;font-weight:700;font-size:13.5px;color:#fff;background:var(--pine);border:0;border-radius:11px;padding:11px;cursor:pointer;margin-bottom:10px}
.card2.bk .amt{font-family:'Space Mono',monospace;font-weight:700}
.markbtn{margin-top:9px;width:100%;font:inherit;font-weight:600;font-size:12.5px;color:var(--pine);background:#eaf1ec;border:1px solid var(--line);border-radius:9px;padding:8px;cursor:pointer}
.markbtn:hover{border-color:var(--pine2);background:#e2ede6}
#dtoast{position:fixed;left:50%;bottom:22px;transform:translateX(-50%) translateY(20px);background:var(--spruce);color:#fff;font-size:13.5px;font-weight:600;padding:11px 16px;border-radius:11px;box-shadow:0 6px 24px rgba(0,0,0,.25);z-index:80;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
#dtoast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));}
function selName(v){return v&&typeof v==='object'?v.name:v;}

function kc(n){return n.toLocaleString(locale())+' Kč';}
function dstr(d,opts){return d?new Date(d).toLocaleDateString(locale(),opts||{day:'numeric',month:'short',year:'numeric'}):'—';}
function isCleaning(f){return !f[F.repairOnly];}
function isWO(f){return selName(f[F.needsFixing])==='Yes';}
function statusOf(f){return selName(f[F.mStatus])||STATUS.OPEN;}
function statusKey(s){if(!s)return 'open';if(s.startsWith('Prob'))return 'prog';if(s.startsWith('Vyře'))return 'done';if(s.startsWith('Neop'))return 'wont';return 'open';}
function optLabel(s){if(!s)return '';const m=String(s).match(/^(.*?)\s*\((.*)\)\s*$/);if(!m)return s;return LANG==='en'?m[2]:m[1];}
function daysBetween(a,b){return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));}
function daysWord(n){if(LANG==='en')return n===1?'day':'days';return n===1?'den':(n>=2&&n<=4?'dny':'dní');}
function whenOf(x){return x.fields[F.startAt]||x.createdTime;}
function byId(id){return RAW.find(x=>x.id===id);}
function monthKey(x){const d=new Date(whenOf(x));return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function monthLabel(k){const [y,m]=k.split('-');return new Date(+y,+m-1,1).toLocaleDateString(locale(),{month:'long',year:'numeric'});}
function inPeriod(d){
  if(!d)return PERIOD==='all';const dt=new Date(d),now=new Date();

  if(PERIOD==='year')return dt.getFullYear()===now.getFullYear();

// ---- booking payments (collection watermark) ----
function bkNights(f){const a=f[BF.checkin],b=f[BF.checkout];if(!a||!b)return 0;return Math.max(0,Math.round((new Date(b)-new Date(a))/86400000));}
function bkCost(f){const party=+f[BF.party]||0;const cribs=(f[BF.guests]||'').split('\n').filter(Boolean).filter(g=>/crib|postýlka/i.test(g)).length;const beds=Math.max(0,party-cribs);const both=/apartm|Apartment/i.test(selName(f[BF.space])||'');const n=bkNights(f);return RATES.bed*beds*n+RATES.util*n+RATES.house+(both?RATES.apt:0);}
function bkApproved(){return BOOKINGS.filter(x=>/Schvál|Approved/i.test(selName(x.fields[BF.status])||''));}
function bkWatermark(){let top=null;bkApproved().forEach(x=>{if(x.fields[BF.collected]){const d=x.fields[BF.checkin];if(d&&(!top||d>top.date))top={date:d,rec:x};}});return top;}
function bkOutstanding(){
  const wm=bkWatermark();const floor=wm?wm.date:(new Date().getFullYear()+'-01-01');const strict=!!wm;
  return bkApproved().filter(x=>!x.fields[BF.collected]&&x.fields[BF.checkin]&&(strict?x.fields[BF.checkin]>floor:x.fields[BF.checkin]>=floor))
    .sort((a,b)=>a.fields[BF.checkin]<b.fields[BF.checkin]?-1:1);
}
function payLbl(f){const acct=f[BF.acct]||'';const pay=selName(f[BF.payment])||'';return /Cash|Hotov/i.test(pay)?T('Hotově','Cash'):((/account|účet/i.test(pay)||acct)?T('JV účet','JV account'):'—');}
function reservationsIn(){return bkApproved().filter(x=>inPeriod(x.fields[BF.checkin])).sort((a,b)=>a.fields[BF.checkin]<b.fields[BF.checkin]?-1:1);}
function upcomingBookings(){
  const today=new Date();today.setHours(0,0,0,0);const horizon=new Date(today.getTime()+30*86400000);
  return bkApproved().filter(x=>{const f=x.fields;if(!f[BF.checkin]||!f[BF.checkout])return false;const ci=new Date(f[BF.checkin]),co=new Date(f[BF.checkout]);return co>=today&&ci<=horizon;}).sort((a,b)=>a.fields[BF.checkin]<b.fields[BF.checkin]?-1:1);
}
function resCard(x){const f=x.fields;const both=/apartm|Apartment/i.test(selName(f[BF.space])||'');return `<div class="card2" data-open="booking" data-id="${x.id}"><div class="r1"><span><b>${esc(f[BF.bookedBy]||'—')}</b></span><span class="amt" style="font-family:'Space Mono',monospace;font-weight:700">$${bkCost(f).toLocaleString('en-US')}</span></div><div class="meta">${dstr(f[BF.checkin])} – ${dstr(f[BF.checkout])} · ${bkNights(f)} ${T('nocí','nights')}${both?' · '+T('+ apartmán','+ apt'):''}${f[BF.acct]?' · #'+esc(f[BF.acct]):''}</div></div>`;}

    const r=await fetch(API,{method:'POST',headers:hdr(),body:JSON.stringify({action:'rentals',days:30})});
    const data=await r.json();
    RENT_ERR=data.error||null;
    UPCOMING=(data.rentals||[]).map(cleanRental).filter(Boolean).sort((a,b)=>a.end<b.end?-1:1);

const SKIP=/^(blocked|booked|book d|massage|selah deep clean|selah billing|get ?meds|mel.s meds|mel’s meds)/i;
function cleanRental(ev){
  const sum=(ev.summary||'').trim();if(!sum||SKIP.test(sum))return null;
  const start=(ev.start&&(ev.start.date||ev.start.dateTime))||ev.start;
  const end=(ev.end&&(ev.end.date||ev.end.dateTime))||ev.end;
  if(!start||!end)return null;
  const name=sum.split('#')[0].trim();
  return {name,start:String(start).slice(0,10),end:String(end).slice(0,10)};
}

const MON3={Jan:0,Feb:1,Mar:2,Apr:3,May:4,Jun:5,Jul:6,Aug:7,Sep:8,Oct:9,Nov:10,Dec:11};
function stayNights(renter,ref){
  if(!renter)return null;
  const p=String(renter).split('·').pop().trim().replace(/[–—]/g,'-');
  let sM,sD,eM,eD,m;
  if((m=p.match(/([A-Za-z]{3})\s+(\d+)\s*-\s*([A-Za-z]{3})\s+(\d+)/))){sM=MON3[m[1]];sD=+m[2];eM=MON3[m[3]];eD=+m[4];}
  else if((m=p.match(/([A-Za-z]{3})\s+(\d+)\s*-\s*(\d+)/))){sM=eM=MON3[m[1]];sD=+m[2];eD=+m[3];}
  else return null;
  if(sM==null||eM==null)return null;
  const y=ref?new Date(ref).getFullYear():new Date().getFullYear();
  const s=new Date(sM>eM?y-1:y,sM,sD), e=new Date(y,eM,eD);
  const n=Math.round((e-s)/86400000);
  return n>0&&n<90?n:null;
}
function cleaningView(id){
  return {title:()=>T('Úklid','Cleaning'),body:()=>{
    const x=byId(id);if(!x)return empty();const f=x.fields;
    let html='';ROOMS.forEach(grp=>{const done=grp.items.filter(([rid])=>f[rid]===true);if(!done.length)return;
      html+=`<div class="grp">${T(grp.cs,grp.en)}</div>`;done.forEach(([rid,cs,en,price])=>{html+=`<div class="line"><span>${esc(T(cs,en))}</span><span class="v">${price} Kč</span></div>`;});});
    html+=`<div class="line"><span>${T('Základní poplatek','Base fee')}</span><span class="v">${BASE_FEE} Kč</span></div>`;
    html+=`<div class="line tot"><span>${T('Odměna celkem','Pay total')}</span><span class="v">${kc(money(f[F.totalOwed]))}</span></div>`;
    const paid=!!f[F.paid];const fine=f[F.fines]||0;const notes=f[F.notes]||'';
    const nts=stayNights(f[F.renter],whenOf(x));
    const renterLine=f[F.renter]?esc(f[F.renter])+(nts?` <span style="color:var(--soft);font-weight:400">(${nts} ${daysWord(nts)==='den'||daysWord(nts)==='day'?T('noc','night'):T('nocí','nights')})</span>`:''):'';
    const missed=CHECKS.filter(([id])=>{const v=selName(f[id]);return v&&String(v).trim()==='No';});
    return `<div class="detail">
      <div class="kv"><span class="k">${T('Datum','Date')}</span><span>${dstr(whenOf(x))}</span>
        ${f[F.renter]?`<span class="k">${T('Hosté','Guest')}</span><span><b>${renterLine}</b></span>`:''}
        <span class="k">${T('Uklízeč','Cleaner')}</span><span>${esc(f[F.cleaner]||'—')}</span>
        <span class="k">${T('Platba','Payment')}</span><span>${paid?'✓ '+T('zaplaceno','paid')+(f[F.paidDate]?' '+dstr(f[F.paidDate]):''):'— '+T('nezaplaceno','unpaid')}</span></div>
      <div class="sec"><div class="st">${T('Co bylo uklizeno','What was cleaned')}</div>${html}</div>
      ${fine?`<div class="sec"><div class="st">${T('Pokuty hostům','Guest fines')}</div>
        <div style="font-size:12px;color:var(--soft);margin-bottom:6px">${T('Nesplněné úkoly při odjezdu — účtováno hostům:','Checkout tasks not done — charged to guests:')}</div>
        ${missed.length?missed.map(([id,cs,en,amt])=>`<div class="line"><span>✗ ${T(cs,en)}</span><span class="v">${amt} Kč</span></div>`).join(''):''}
        <div class="line tot"><span>${T('Pokuty celkem','Total fines')}</span><span class="v">${kc(fine)}</span></div></div>`:''}
      ${notes?`<div class="sec"><div class="st">${T('Poznámky','Notes')}</div><div class="box">${esc(notes)}</div></div>`:''}
    </div>`;
  }};
}
function woView(id){
  return {title:()=>T('Zakázka','Work order')+' '+woRef(id),body:()=>{
    const x=byId(id);if(!x)return empty();const f=x.fields;const k=statusKey(statusOf(f));const now=new Date();
    const done=k==='done'&&f[F.resolvedDate];
    const durLine=done?`${T('Opraveno za','Fixed in')} <b>${fixDays(x)} ${daysWord(fixDays(x))}</b> (${dstr(whenOf(x))} → ${dstr(f[F.resolvedDate])})`
      :`${T('Otevřeno','Open for')} <b>${daysBetween(whenOf(x),now)} ${daysWord(daysBetween(whenOf(x),now))}</b> (${T('od','since')} ${dstr(whenOf(x))})`;
    const ups=String(f[F.updates]||'').split('\n').map(s=>s.trim()).filter(Boolean).map(line=>{const m=line.match(/^(\S+)\s+·\s+(.+?)\s+—\s+(.*)$/);if(m)return{date:m[1],name:m[2],body:m[3]};const m2=line.match(/^(\S+)\s+—\s+(.*)$/);return m2?{date:m2[1],name:'',body:m2[2]}:{date:'',name:'',body:line};});
    return `<div class="detail">
      <div class="kv">
        <span class="k">${T('Stav','Status')}</span><span><span class="chip2 c-${k}">${esc(optLabel(statusOf(f)).toUpperCase())}</span></span>
        <span class="k">${T('Priorita','Priority')}</span><span>${esc(optLabel(selName(f[F.priority]))||'—')}</span>
        <span class="k">${T('Nahlásil/a','Reported by')}</span><span>${esc(f[F.cleaner]||'—')} · ${dstr(whenOf(x))}</span>
        <span class="k">${T('Přiděleno','Assigned to')}</span><span>${esc(f[F.assigned]||'—')}</span></div>
      <div class="box" style="margin-top:10px">${durLine}</div>
      <div class="sec"><div class="st">${T('Popis závady','Reported problem')}</div><div class="box">${esc(f[F.fixNotes]||'—')}</div></div>
      ${f[F.resolutionNotes]?`<div class="sec"><div class="st">${T('Co bylo opraveno','What was repaired')}</div><div class="box">${esc(f[F.resolutionNotes])}</div></div>`:''}
      <div class="sec"><div class="st">${T('Průběh','Updates')}</div>${ups.length?ups.map(u=>`<div class="tl-item">${u.date?`<span class="d">${esc(u.date)}</span> `:''}${u.name?`<span class="au">${esc(u.name)}</span> · `:''}${esc(u.body)}</div>`).join(''):`<div class="empty" style="text-align:left;padding:0">${T('Zatím žádné aktualizace.','No updates yet.')}</div>`}</div>
    </div>`;
  }};
}
function monthView(key){
  return {title:()=>monthLabel(key),body:()=>{
    const cl=RAW.filter(x=>isCleaning(x.fields)&&monthKey(x)===key).sort((a,b)=>new Date(whenOf(b))-new Date(whenOf(a)));
    const wos=RAW.filter(x=>isWO(x.fields)&&monthKey(x)===key);
    let pay=0,fine=0,unpaid=0;cl.forEach(x=>{pay+=money(x.fields[F.totalOwed]);fine+=(x.fields[F.fines]||0);if(!x.fields[F.paid])unpaid+=money(x.fields[F.totalOwed]);});
    return `<div class="detail">
      <div class="kv">
        <span class="k">${T('Úklidy','Cleanings')}</span><span>${cl.length}</span>
        <span class="k">${T('Odměna celkem','Total pay')}</span><span class="pay">${kc(pay)}</span>
        <span class="k">${T('Nezaplaceno','Unpaid')}</span><span class="${unpaid?'fine':''}">${unpaid?kc(unpaid):'—'}</span>
        <span class="k">${T('Pokuty hostům','Guest fines')}</span><span class="${fine?'fine':''}">${fine?kc(fine):'—'}</span></div>
      <div class="sec"><div class="st">${T('Úklidy v měsíci','Cleanings this month')}</div>${cl.length?cl.map(cleaningCard).join(''):empty()}</div>
      ${wos.length?`<div class="sec"><div class="st">${T('Nahlášené opravy','Repairs reported')}</div>${wos.map(woCard).join('')}</div>`:''}
    </div>`;
  }};
}

function bookingById(id){return (BOOKINGS||[]).find(x=>x.id===id);}
function bookingView(id){
  return {title:()=>T('Rezervace','Booking'),body:()=>{
    const x=bookingById(id);if(!x)return empty();const f=x.fields;
    const both=/apartm|Apartment/i.test(selName(f[BF.space])||'');
    const st=selName(f[BF.status])||'';
    const k=/Schvál|Approved/i.test(st)?'done':(/Zamít|Declined/i.test(st)?'open':'prog');
    const contact=[f[BF.email]?`<a href="mailto:${esc(f[BF.email])}" style="color:var(--pine2)">${esc(f[BF.email])}</a>`:'',f[BF.phone]?esc(f[BF.phone]):''].filter(Boolean).join(' · ')||'—';
    const purpose=optLabel(selName(f[BF.purpose]))||'';
    const total=bkCost(f);const ppl=+f[BF.party]||0;const n=bkNights(f)||0;
    const m2=v=>'$'+(Math.round(v*100)/100).toLocaleString('en-US',{maximumFractionDigits:2});
    const perP=ppl?m2(total/ppl):'—';const perPN=(ppl&&n)?m2(total/(ppl*n)):'—';
    return `<div class="detail">
      <div class="kv">
        <span class="k">${T('Host','Guest')}</span><span><b>${esc(f[BF.bookedBy]||'—')}</b></span>
        <span class="k">${T('Stav','Status')}</span><span><span class="chip2 c-${k}">${esc((optLabel(st)||'—').toUpperCase())}</span></span>
        <span class="k">${T('Termín','Dates')}</span><span>${dstr(f[BF.checkin])} → ${dstr(f[BF.checkout])} · ${bkNights(f)} ${T('nocí','nights')}</span>
        <span class="k">${T('Prostor','Space')}</span><span>${both?T('Dům + apartmán','House + apt'):T('Hlavní dům','Main house')}</span>
        <span class="k">${T('Počet osob','Party')}</span><span>${esc(f[BF.party]||'—')}</span>
        <span class="k">${T('Celková cena','Total cost')}</span><span class="pay">$${total.toLocaleString('en-US')}</span>
        <span class="k">${T('Na osobu','Per person')}</span><span>${perP}</span>
        <span class="k">${T('Na osobu / noc','Per person / night')}</span><span>${perPN}</span>
        <span class="k">${T('Platba','Payment')}</span><span>${payLbl(f)}${f[BF.acct]?' · #'+esc(f[BF.acct]):''}</span>
        <span class="k">${T('Inkasováno','Collected')}</span><span>${f[BF.collected]?'✓ '+(f[BF.collectedDate]?dstr(f[BF.collectedDate]):T('ano','yes')):'—'}</span>
        <span class="k">${T('JV tým','JV team')}</span><span>${esc(f[BF.team]||'—')}</span>
        <span class="k">${T('Kontakt','Contact')}</span><span>${contact}</span>
      </div>
      ${f[BF.guests]?`<div class="sec"><div class="st">${T('Hosté','Guests')}</div><div class="box">${esc(f[BF.guests])}</div></div>`:''}
      ${(purpose||f[BF.reason])?`<div class="sec"><div class="st">${T('Účel','Purpose')}</div><div class="box">${esc([purpose,f[BF.reason]].filter(Boolean).join(' — '))}</div></div>`:''}
      <a class="adminlink" href="/bookings.html?id=${id}">✏️ ${T('Otevřít ve správě rezervací (upravit, e-maily, platba)','Open in Reservation Admin (edit, emails, payment)')} →</a>
    </div>`;
  }};
}
document.addEventListener('click',e=>{
  const mk=e.target.closest('[data-mark]');
  if(mk){markCollected(mk.dataset.mark);return;}
  if(e.target.closest('[data-copybk]')){copyBookingReport();return;}
  const t=e.target.closest('[data-open]');
  if(t){const o=t.dataset.open;
    if(o==='list'){stack=[listView(t.dataset.kind)];paint();}
    else if(o==='cleaning')push(cleaningView(t.dataset.id));
    else if(o==='booking')push(bookingView(t.dataset.id));
    else if(o==='wo')push(woView(t.dataset.id));
    else if(o==='month'){stack=[monthView(t.dataset.key)];paint();}
    return;}
  if(e.target.id==='modal')closeM();
});
document.getElementById('mBack').onclick=back;
document.getElementById('mClose').onclick=closeM;
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeM();if((e.key==='Enter'||e.key===' ')&&document.activeElement&&document.activeElement.classList.contains('woitem')){e.preventDefault();document.activeElement.click();}});

applyLang();
load();
loadRentals();
loadBookings();
</script>
